<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E2E"/>
      <stop offset="100%" stop-color="#2B2B3D"/>
    </linearGradient>

    <!-- Node Gradient -->
    <radialGradient id="nodeGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#5E81AC"/>
      <stop offset="100%" stop-color="#3B5998"/>
    </radialGradient>

    <!-- Path Highlight Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App Icon Background -->
  <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Subtle Grid -->
  <g opacity="0.05">
    <pattern id="gridPattern" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#8FBCBB" stroke-width="0.8"/>
    </pattern>
    <rect x="0" y="0" width="256" height="256" rx="48" ry="48" fill="url(#gridPattern)"/>
  </g>

  <!-- Tree Structure -->
  <g transform="translate(128, 130)">
    <!-- Edges (left and right children) -->
    <line x1="0" y1="-60" x2="-56" y2="32" stroke="#4C566A" stroke-width="6" stroke-linecap="round"/>
    <line x1="0" y1="-60" x2="56" y2="32" stroke="#4C566A" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Highlighted Path to Right Node (search result) -->
    <line x1="0" y1="-60" x2="56" y2="32" stroke="#EBCB8B" stroke-width="6" stroke-linecap="round" filter="url(#glow)" opacity="0.8"/>
    <path d="M 0 -60 L 56 32" fill="none" stroke="#EBCB8B" stroke-width="3" stroke-dasharray="8,6" opacity="0.6"/>
    
    <!-- Root Node -->
    <circle cx="0" cy="-60" r="24" fill="url(#nodeGrad)" stroke="#5E81AC" stroke-width="4"/>
    <text x="0" y="-54" fill="#FFFFFF" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">GS</text>

    <!-- Left Child Node (search target) -->
    <circle cx="-56" cy="32" r="20" fill="url(#nodeGrad)" stroke="#5E81AC" stroke-width="4" opacity="0.9"/>
    
    <!-- Right Child Node (goal / found) -->
    <circle cx="56" cy="32" r="20" fill="url(#nodeGrad)" stroke="#EBCB8B" stroke-width="4" opacity="0.9"/>
    <!-- Tiny target icon inside right node -->
    <circle cx="56" cy="32" r="6" fill="none" stroke="#EBCB8B" stroke-width="3"/>
    <circle cx="56" cy="32" r="2" fill="#EBCB8B"/>
  </g>

  <!-- Magnifying Glass (Search Algorithm) -->
  <g transform="translate(72, 72)">
    <circle cx="20" cy="20" r="18" fill="none" stroke="#D8DEE9" stroke-width="5"/>
    <line x1="33" y1="33" x2="46" y2="46" stroke="#D8DEE9" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Small Algorithmic Dots (floating) -->
  <g fill="#8FBCBB" opacity="0.4">
    <circle cx="190" cy="60" r="4"/>
    <circle cx="200" cy="80" r="3"/>
    <circle cx="175" cy="90" r="4"/>
    <circle cx="210" cy="100" r="3"/>
  </g>

  <!-- Connection point lines (network feel) -->
  <g stroke="#4C566A" stroke-width="3" stroke-linecap="round" opacity="0.3">
    <line x1="100" y1="80" x2="108" y2="72"/>
    <line x1="160" y1="50" x2="172" y2="50"/>
  </g>
</svg>