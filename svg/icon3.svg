<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="300" height="300">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C2F3A"/>
      <stop offset="100%" stop-color="#13161C"/>
    </linearGradient>
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F0FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00A0CC" stop-opacity="1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="neonCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#00F0FF" flood-opacity="0.8"/>
    </filter>
    <filter id="neonGold" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#FFD700" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Dark circular background -->
  <circle cx="200" cy="200" r="180" fill="#1A1C22" stroke="#00F0FF" stroke-width="3" filter="url(#shadow)"/>
  
  <!-- Inner circle representing localization radar -->
  <circle cx="200" cy="200" r="140" fill="none" stroke="#00F0FF" stroke-opacity="0.15" stroke-width="2"/>
  <circle cx="200" cy="200" r="100" fill="none" stroke="#00F0FF" stroke-opacity="0.25" stroke-width="2" stroke-dasharray="6,6"/>
  <circle cx="200" cy="200" r="60" fill="none" stroke="#00F0FF" stroke-opacity="0.4" stroke-width="2"/>

  <!-- Central compass / location pin symbol (combined with robot head) -->
  <!-- Outer location pin shape -->
  <path d="M200 80 C130 80 100 140 100 190 C100 260 200 320 200 320 C200 320 300 260 300 190 C300 140 270 80 200 80 Z" 
        fill="url(#bodyGrad)" stroke="#00F0FF" stroke-width="3" filter="url(#neonCyan)"/>

  <!-- Robot eyes (two cyan dots) -->
  <circle cx="170" cy="160" r="10" fill="#00F0FF" filter="url(#neonCyan)"/>
  <circle cx="230" cy="160" r="10" fill="#00F0FF" filter="url(#neonCyan)"/>

  <!-- Robot mouth (algorithm path signal bars) -->
  <rect x="175" y="190" width="12" height="4" rx="2" fill="#FFD700" filter="url(#neonGold)"/>
  <rect x="190" y="185" width="12" height="9" rx="2" fill="#FFD700" filter="url(#neonGold)"/>
  <rect x="205" y="180" width="12" height="14" rx="2" fill="#FFD700" filter="url(#neonGold)"/>
  <rect x="220" y="185" width="12" height="9" rx="2" fill="#FFD700" filter="url(#neonGold)"/>
  <rect x="235" y="190" width="12" height="4" rx="2" fill="#FFD700" filter="url(#neonGold)"/>

  <!-- Algorithm branching lines on the side (representing DFS/BFS/A*) -->
  <g stroke="#FFD700" stroke-width="2" fill="none" filter="url(#neonGold)">
    <!-- Branching paths -->
    <path d="M200 80 L200 50 L160 30"/>
    <path d="M200 80 L200 50 L240 30"/>
    <path d="M160 30 L120 20"/>
    <path d="M160 30 L140 45"/>
    <path d="M240 30 L280 20"/>
    <path d="M240 30 L260 45"/>
  </g>

  <!-- Small dots on branching ends -->
  <circle cx="120" cy="20" r="3" fill="#FFD700" filter="url(#neonGold)"/>
  <circle cx="140" cy="45" r="3" fill="#FFD700" filter="url(#neonGold)"/>
  <circle cx="280" cy="20" r="3" fill="#FFD700" filter="url(#neonGold)"/>
  <circle cx="260" cy="45" r="3" fill="#FFD700" filter="url(#neonGold)"/>

  <!-- Destination marker at the tip of the pin (purely graphic, no text) -->
  <circle cx="200" cy="320" r="12" fill="#FF4A4A" filter="url(#shadow)"/>
  <circle cx="200" cy="320" r="6" fill="#FFFFFF" opacity="0.8"/>
</svg>