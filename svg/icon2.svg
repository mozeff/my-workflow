<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" rx="20" ry="20" fill="#1e1e1e" stroke="#555" stroke-width="4"/>

  <!-- Grid lines -->
  <line x1="60" y1="0" x2="60" y2="200" stroke="#777" stroke-width="3"/>
  <line x1="130" y1="0" x2="130" y2="200" stroke="#777" stroke-width="3"/>
  <line x1="0" y1="60" x2="200" y2="60" stroke="#777" stroke-width="3"/>
  <line x1="0" y1="130" x2="200" y2="130" stroke="#777" stroke-width="3"/>

  <!-- Tiles (positions: 0,0 top-left, 2,2 bottom-right) -->
  <!-- Row 0 -->
  <rect x="10" y="10" width="40" height="40" rx="5" fill="#2d2d2d"/>
  <text x="30" y="40" font-family="Arial" font-size="20" fill="#fff" text-anchor="middle">1</text>

  <rect x="75" y="10" width="40" height="40" rx="5" fill="#2d2d2d"/>
  <text x="95" y="40" font-family="Arial" font-size="20" fill="#fff" text-anchor="middle">2</text>

  <rect x="145" y="10" width="40" height="40" rx="5" fill="#2d2d2d"/>
  <text x="165" y="40" font-family="Arial" font-size="20" fill="#fff" text-anchor="middle">3</text>

  <!-- Row 1 -->
  <rect x="10" y="75" width="40" height="40" rx="5" fill="#2d2d2d"/>
  <text x="30" y="105" font-family="Arial" font-size="20" fill="#fff" text-anchor="middle">4</text>

  <rect x="75" y="75" width="40" height="40" rx="5" fill="#2d2d2d"/>
  <text x="95" y="105" font-family="Arial" font-size="20" fill="#fff" text-anchor="middle">5</text>

  <rect x="145" y="75" width="40" height="40" rx="5" fill="#2d2d2d"/>
  <text x="165" y="105" font-family="Arial" font-size="20" fill="#fff" text-anchor="middle">6</text>

  <!-- Row 2: Fixed y positions from 150 to 145 -->
  <rect x="10" y="145" width="40" height="40" rx="5" fill="#2d2d2d"/>
  <text x="30" y="175" font-family="Arial" font-size="20" fill="#fff" text-anchor="middle">7</text>

  <rect x="75" y="145" width="40" height="40" rx="5" fill="#2d2d2d"/>
  <text x="95" y="175" font-family="Arial" font-size="20" fill="#fff" text-anchor="middle">8</text>

  <!-- Empty tile hint -->
  <rect x="145" y="145" width="40" height="40" rx="5" fill="#1a1a1a" stroke="#888" stroke-width="2" stroke-dasharray="4,4"/>
</svg>