name: 🖼️ tool-Convert All SVGs to PNG

on:
  workflow_dispatch:
    inputs:
      glob_pattern:
        description: 'Glob pattern for SVG files (default: **/*.svg)'
        required: false
        default: '**/*.svg'
        type: string

jobs:
  convert-all-svgs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install rsvg-convert
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq librsvg2-bin

      - name: Convert all matching SVGs to PNG
        run: |
          PATTERN="${{ github.event.inputs.glob_pattern }}"
          echo "Looking for SVGs with pattern: $PATTERN"

          # Enable recursive globbing (**/*.svg)
          shopt -s globstar nullglob
          svgs=( $PATTERN )
          echo "Found ${#svgs[@]} SVG(s)."

          for svg in "${svgs[@]}"; do
            png="${svg%.svg}.png"
            echo "Converting: $svg → $png"
            mkdir -p "$(dirname "$png")"
            rsvg-convert --output "$png" "$svg"
          done

          echo "All conversions finished."

      - name: Commit and push all generated PNGs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          BRANCH="${GITHUB_REF_NAME}"
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"

          # Add all PNG files in the repo (recursively)
          shopt -s globstar nullglob
          git add --force **/*.png

          if git diff --cached --quiet; then
            echo "No changes to push."
            exit 0
          fi

          git commit -m "🖼️ Converted SVGs to PNGs [skip ci]"

          RETRY_MAX=10
          for ((i=1; i<=RETRY_MAX; i++)); do
            echo "Push attempt $i/$RETRY_MAX"
            if git push origin HEAD:"$BRANCH" 2>&1; then
              echo "Push successful!"
              exit 0
            else
              WAIT=$((2 + RANDOM % 8))
              echo "Push failed, retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done

          echo "All push attempts failed."
          exit 1