name: ✈️ 10-TG Channel Last Messages

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'آدرس یا نام کاربری کانال تلگرام'
        required: true
        type: string
      message_count:
        description: 'تعداد پیام‌های آخر برای دریافت (پیش‌فرض ۱۰)'
        required: false
        default: '10'
        type: string
      zip_option:
        description: 'آیا خروجی فشرده شود؟'
        required: true
        type: choice
        options:
          - 'zip'
          - 'no_zip'
        default: 'zip'
      password:
        description: 'رمز فایل فشرده (اختیاری)'
        required: false
        default: ''
        type: string
      split_size:
        description: 'حداکثر حجم هر پارت (MB) - اگر فایل بزرگتر باشد split می‌شود (پیش‌فرض ۸۰)'
        required: false
        default: '80'
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y p7zip-full

      - name: Install puppeteer-core
        run: npm install puppeteer-core

      - name: Extract channel username
        id: channel_info
        run: |
          CLEAN=$(echo "${{ github.event.inputs.channel }}" | sed -E 's|https?://t\.me/||i' | sed 's/^@//' | sed 's|/.*||')
          echo "slug=$CLEAN" >> $GITHUB_OUTPUT

      - name: Fetch messages & screenshot
        env:
          CHANNEL: ${{ steps.channel_info.outputs.slug }}
          COUNT: ${{ github.event.inputs.message_count }}
        run: |
          cat > fetch.js << 'EOF'
          const puppeteer = require('puppeteer-core');
          const fs = require('fs');

          (async () => {
            const browser = await puppeteer.launch({
              executablePath: '/usr/bin/google-chrome',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 3000 });
            await page.goto(`https://t.me/s/${process.env.CHANNEL}`, {
              waitUntil: 'networkidle0',
              timeout: 60000
            });

            try {
              await page.waitForSelector('.tgme_widget_message_wrap', { timeout: 10000 });
            } catch {
              console.error('No messages found or page blocked');
              await browser.close();
              process.exit(1);
            }

            let wantedCount = parseInt(process.env.COUNT, 10);
            if (isNaN(wantedCount) || wantedCount < 1) {
              console.warn(`Invalid message_count "${process.env.COUNT}", using 10.`);
              wantedCount = 10;
            }

            const messages = await page.evaluate((count) => {
              const msgElements = document.querySelectorAll('.tgme_widget_message_wrap');
              const msgs = [];
              msgElements.forEach((el, i) => {
                if (i >= count) return;
                const textEl = el.querySelector('.tgme_widget_message_text');
                const dateEl = el.querySelector('.tgme_widget_message_date time');
                const text = textEl ? textEl.innerText.trim() : '';
                const date = dateEl ? dateEl.getAttribute('datetime') : '';
                const dateLink = el.querySelector('a.tgme_widget_message_date');
                const link = dateLink ? dateLink.href : '';
                msgs.push({ date, text, link });
              });
              return msgs;
            }, wantedCount);

            let txt = '';
            messages.forEach((m, idx) => {
              txt += `${idx+1}. ${m.date}\n${m.link}\n${m.text}\n\n`;
            });

            fs.writeFileSync('messages.txt', txt.trim());
            await page.screenshot({ path: 'screenshot.png' });
            await browser.close();

            console.log(`Fetched ${messages.length} messages.`);
          })();
          EOF
          node fetch.js

      - name: Prepare, package and split if needed
        id: prepare
        run: |
          PASS="${{ github.event.inputs.password }}"
          ZIP_OPTION="${{ github.event.inputs.zip_option }}"
          SLUG="${{ steps.channel_info.outputs.slug }}"
          COUNT="${{ github.event.inputs.message_count }}"
          TS=$(date +%Y%m%d_%H%M%S)

          # مقدار split_size از ورودی کاربر (با اعتبارسنجی ساده)
          SPLIT_MB=${{ github.event.inputs.split_size }}
          if ! [[ "$SPLIT_MB" =~ ^[0-9]+$ ]] || [ "$SPLIT_MB" -le 0 ]; then
            echo "مقدار split_size نامعتبر است، از ۸۰ استفاده می‌شود."
            SPLIT_MB=80
          fi
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))

          DIR="channel_messages/${SLUG}_${TS}_${COUNT}"
          mkdir -p "$DIR"

          # متغیر برای نگهداری نام فایل نهایی (بسته یا تکی) و لیست پارت‌ها
          ARCHIVE_NAME=""
          PARTS_LIST=""

          if [ "$ZIP_OPTION" = "zip" ]; then
            ARCHIVE_NAME="output.7z"
            if [ -n "$PASS" ]; then
              7z a -p"${PASS}" -mhe=on "${DIR}/${ARCHIVE_NAME}" messages.txt screenshot.png
            else
              7z a "${DIR}/${ARCHIVE_NAME}" messages.txt screenshot.png
            fi
            # بررسی اندازه
            SIZE=$(stat -c%s "${DIR}/${ARCHIVE_NAME}")
            if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
              echo "حجم فایل 7z بیشتر از ${SPLIT_MB}MB است. در حال split..."
              cd "$DIR"
              # حذف فایل اصلی بعد از split
              7z a -v${SPLIT_MB}m ${ARCHIVE_NAME} ${ARCHIVE_NAME}
              # حالا فایل‌های output.7z.001 و ... ایجاد شده‌اند
              # فایل اصلی output.7z (که split نشده) حذف می‌شود چون 7z -v آن را نمی‌سازد
              # فهرست پارت‌ها را ذخیره می‌کنیم
              ls output.7z.* > /tmp/parts_list.txt
              cd ../..
              PARTS_LIST=$(cat "$DIR"/parts_list.txt 2>/dev/null || true)
            else
              PARTS_LIST="${ARCHIVE_NAME}"
            fi
          else
            # حالت no_zip
            cp messages.txt screenshot.png "$DIR"/
            # محاسبه مجموع حجم فایل‌ها
            TOTAL_SIZE=0
            for f in "$DIR"/*; do
              [ -f "$f" ] && TOTAL_SIZE=$((TOTAL_SIZE + $(stat -c%s "$f")))
            done
            if [ "$TOTAL_SIZE" -gt "$SPLIT_BYTES" ]; then
              echo "حجم فایل‌های بدون فشرده‌سازی بیشتر از ${SPLIT_MB}MB است. در حال split..."
              cd "$DIR"
              # یک tar از فایل‌ها می‌سازیم و سپس split می‌کنیم (تا همه فایل‌ها با هم بسته شوند)
              tar -cf bundle.tar messages.txt screenshot.png
              split -b ${SPLIT_MB}m -d --additional-suffix=.part bundle.tar bundle.tar.
              rm bundle.tar messages.txt screenshot.png
              ls bundle.tar.* > /tmp/parts_list.txt
              cd ../..
              PARTS_LIST=$(cat "$DIR"/parts_list.txt 2>/dev/null || true)
            else
              PARTS_LIST=$(ls "$DIR")
            fi
          fi

          # پاکسازی فایل‌های موقت
          rm -f messages.txt screenshot.png

          # ذخیره اطلاعات برای مرحله بعد
          echo "split_size_mb=$SPLIT_MB" >> $GITHUB_ENV
          echo "dir=$DIR" >> $GITHUB_ENV
          echo "parts_list=$PARTS_LIST" >> $GITHUB_ENV
          echo "zip_option=$ZIP_OPTION" >> $GITHUB_ENV
          echo "password=$PASS" >> $GITHUB_ENV

      - name: Generate README with download links
        run: |
          DIR="${{ env.dir }}"
          SPLIT_MB="${{ env.split_size_mb }}"
          PASS="${{ env.password }}"
          ZIP_OPTION="${{ env.zip_option }}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          FOLDER_NAME=$(basename "$DIR")
          FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
          RAW_BASE="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/refs/heads/${BRANCH}/channel_messages/${FOLDER_ENCODED}"

          PARTS_LIST="${{ env.parts_list }}"

          {
            echo "# 📥 پیام‌های کانال"
            echo ""
            echo "**پوشه:** \`${FOLDER_NAME}\`"
            echo "**تعداد پیام‌ها:** ${{ github.event.inputs.message_count }}"
            echo "**رمز فشرده:** $([ -n "$PASS" ] && echo '✅ بله' || echo '❌ خیر')"
            echo ""
            echo "---"
            echo ""
            echo "## 📦 فایل‌های موجود"
            echo ""
            if [ -z "$PARTS_LIST" ]; then
              echo "فایلی یافت نشد!"
            else
              # بررسی اینکه split شده یا نه
              if echo "$PARTS_LIST" | grep -q '\.' && (echo "$PARTS_LIST" | grep -q '\.7z\.' || echo "$PARTS_LIST" | grep -q '\.tar\.'); then
                echo "فایل‌ها به **${SPLIT_MB}MB** پارت تقسیم شده‌اند:"
                echo ""
                echo "| # | نام فایل | لینک دانلود |"
                echo "|---|----------|-------------|"
                I=1
                for PART in $PARTS_LIST; do
                  PART_ENC=$(urlencode "$PART")
                  echo "| $I | \`$PART\` | [📥 دانلود](${RAW_BASE}/${PART_ENC}) |"
                  I=$((I+1))
                done
                echo ""
                echo "### 🛠️ روش ترکیب دوباره"
                if echo "$PART" | grep -q '7z'; then
                  echo "۱. همه پارت‌ها را دانلود کنید."
                  echo "۲. با 7-Zip روی \`.7z.001\` راست‌کلیک کرده و Extract Here را بزنید."
                  [ -n "$PASS" ] && echo "۳. در صورت درخواست رمز، آن را وارد کنید."
                else
                  BUNDLE_NAME="bundle.tar"
                  echo "۱. همه پارت‌ها را دانلود کنید."
                  echo "۲. در ترمینال دستور زیر را اجرا کنید:"
                  echo "\`\`\`bash"
                  echo "cat ${BUNDLE_NAME}.*.part > ${BUNDLE_NAME}"
                  echo "tar -xf ${BUNDLE_NAME}"
                  echo "\`\`\`"
                fi
              else
                echo "فایل(ها) بدون split:"
                echo ""
                for FILE in $PARTS_LIST; do
                  FILE_ENC=$(urlencode "$FILE")
                  echo "- [\`$FILE\`](${RAW_BASE}/${FILE_ENC})"
                done
              fi
            fi
            echo ""
            echo "---"
            echo "*تولید خودکار توسط GitHub Actions*"
          } > "${DIR}/README.md"

          echo "✅ README created."

      - name: Commit and push
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A channel_messages/
          git commit -m "channel messages [skip ci]" || true

          for i in 1 2 3 4 5; do
            if timeout 120 git push origin HEAD:"$BRANCH"; then
              echo "Push ok"
              exit 0
            fi
            sleep $((2 + RANDOM % 5))
            git fetch origin "$BRANCH" --quiet
            git reset --hard origin/"$BRANCH"
            git add -A channel_messages/
            git commit -m "channel messages [skip ci]" || true
          done
          echo "Push failed"
          exit 1