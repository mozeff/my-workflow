name: 🌐 04-Browse the Web

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to visit'
        required: true
        type: string
      zip_password:
        description: 'Password for the encrypted ZIP (leave blank to skip encryption)'
        required: false
        type: string
        default: ''
      include_screenshot:
        description: 'Take a full-page screenshot?'
        required: false
        type: boolean
        default: true
      download_media:
        description: 'Download images and other media files?'
        required: false
        type: boolean
        default: true
      # ───── گزینه جدید ذخیره‌سازی MHTML ─────
      save_mhtml:
        description: 'Save the page as a single MHTML file?'
        required: false
        type: boolean
        default: false
      # ─────────────────────────────────────
      split_size:
        description: 'Max size per part (MB) – 0 or empty = no split (default 90)'
        required: false
        type: string
        default: '90'

jobs:
  browse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl zip imagemagick

      - name: Setup Node.js and Puppeteer
        # شرط گسترش یافته برای MHTML
        if: ${{ github.event.inputs.include_screenshot == 'true' || github.event.inputs.download_media == 'true' || github.event.inputs.save_mhtml == 'true' }}
        run: |
          npm init -y > /dev/null
          npm install puppeteer > /dev/null

      - name: Create screenshot & HTML extractor script
        if: ${{ github.event.inputs.include_screenshot == 'true' || github.event.inputs.download_media == 'true' || github.event.inputs.save_mhtml == 'true' }}
        run: |
          cat > screenshot.js << 'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const url = process.argv[2];
          const screenshotPath = process.argv[3];
          const htmlPath = process.argv[4];
          const doScreenshot = process.argv[5] === 'true';
          // آرگومان‌های جدید MHTML
          const doMhtml = process.argv[6] === 'true';
          const mhtmlPath = process.argv[7];

          (async () => {
            const browser = await puppeteer.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 720 });

            try {
              await page.goto(url, { waitUntil: 'networkidle2', timeout: 30000 });

              // اسکرول به‌منظور بارگذاری کامل محتوا
              await page.evaluate(async () => {
                await new Promise((resolve) => {
                  let totalHeight = 0;
                  const distance = 300;
                  const timer = setInterval(() => {
                    window.scrollBy(0, distance);
                    totalHeight += distance;
                    if (totalHeight >= document.body.scrollHeight) {
                      clearInterval(timer);
                      resolve();
                    }
                  }, 150);
                });
              });
              await page.waitForTimeout(2000);

              // ───── ضبط MHTML (قبل از اسکرین‌شات) ─────
              if (doMhtml && mhtmlPath) {
                console.log('Capturing MHTML...');
                const cdp = await page.target().createCDPSession();
                const { data } = await cdp.send('Page.captureSnapshot', { format: 'mhtml' });
                fs.writeFileSync(mhtmlPath, data);
                console.log('MHTML saved successfully');
              }
              // ────────────────────────────────────────

              if (doScreenshot) {
                await page.screenshot({ path: screenshotPath, fullPage: true });
                console.log('Screenshot saved successfully');
              }

              const html = await page.content();
              fs.writeFileSync(htmlPath, html);
              console.log('Rendered HTML saved successfully');
            } catch (err) {
              console.error('Error:', err.message);
              process.exitCode = 1;
            } finally {
              await browser.close();
            }
          })();
          EOF

      - name: Browse URL and collect media
        shell: bash
        run: |
          set -euo pipefail
          RAW_URL="${{ github.event.inputs.url }}"
          INCLUDE_SCREENSHOT="${{ github.event.inputs.include_screenshot }}"
          DOWNLOAD_MEDIA="${{ github.event.inputs.download_media }}"
          SAVE_MHTML="${{ github.event.inputs.save_mhtml }}"

          if [[ ! "$RAW_URL" =~ ^https?:// ]]; then
            HTTPS_URL="https://$RAW_URL"
            if curl -fsL --connect-timeout 10 --max-time 30 -o /dev/null "$HTTPS_URL" 2>/dev/null; then
              URL="$HTTPS_URL"
            else
              URL="http://$RAW_URL"
            fi
          else
            URL="$RAW_URL"
          fi

          generate_random_numeric_name() {
            local PART1=$(( RANDOM * 32768 + RANDOM ))
            local PART2=$(( RANDOM * 32768 + RANDOM ))
            echo "${PART1}${PART2}"
          }

          get_unique_numeric_folder() {
            local CANDIDATE
            while true; do
              CANDIDATE=$(generate_random_numeric_name)
              if [ ! -d "pages/$CANDIDATE" ] && [ ! -f "pages/$CANDIDATE.zip" ] && [ ! -d "/tmp/${CANDIDATE}" ]; then
                echo "$CANDIDATE"
                return
              fi
            done
          }

          FOLDER_NAME=$(get_unique_numeric_folder)
          FOLDER="pages/$FOLDER_NAME"
          MEDIA_DIR="$FOLDER/media"
          mkdir -p "$FOLDER" "$MEDIA_DIR"

          echo "Processing session ID: $FOLDER_NAME"

          SCREENSHOT_OK=false
          HTML_OK=false

          NEED_PUPPETEER=false
          if [ "$INCLUDE_SCREENSHOT" = "true" ] || [ "$DOWNLOAD_MEDIA" = "true" ] || [ "$SAVE_MHTML" = "true" ]; then
            NEED_PUPPETEER=true
          fi

          if $NEED_PUPPETEER; then
            echo "Running Puppeteer (screenshot=$INCLUDE_SCREENSHOT, media=$DOWNLOAD_MEDIA, mhtml=$SAVE_MHTML)..."
            # اجرای اسکریپت با آرگومان‌های MHTML
            if node screenshot.js "$URL" "$FOLDER/screenshot.png" "$FOLDER/page.html" "$INCLUDE_SCREENSHOT" "$SAVE_MHTML" "$FOLDER/page.mhtml"; then
              HTML_OK=true
              if [ "$INCLUDE_SCREENSHOT" = "true" ]; then
                SCREENSHOT_OK=true
              fi
              echo "Puppeteer succeeded: HTML saved. Screenshot: $SCREENSHOT_OK. MHTML: $SAVE_MHTML"
            else
              echo "Puppeteer failed. Falling back to curl for raw HTML."
              curl -sSL -A "Mozilla/5.0" -o "$FOLDER/page.html" "$URL" || {
                echo "Failed to download HTML, creating placeholder"
                echo "<html><body>Failed to load $URL</body></html>" > "$FOLDER/page.html"
              }
            fi
          else
            echo "Skipping Puppeteer, downloading raw HTML with curl."
            curl -sSL -A "Mozilla/5.0" -o "$FOLDER/page.html" "$URL" || {
              echo "Failed to download HTML, creating placeholder"
              echo "<html><body>Failed to load $URL</body></html>" > "$FOLDER/page.html"
            }
          fi

          if [ "$DOWNLOAD_MEDIA" = "true" ]; then
            echo "Extracting and downloading media files..."
            grep -ohP '(?:href|src)="\K[^"]*' "$FOLDER/page.html" | sort -u > "$FOLDER/all_links.txt"

            MEDIA_EXT='png|jpg|jpeg|gif|svg|webp|bmp|ico|mp3|wav|ogg|flac|aac|mp4|webm|avi|mov|mkv|pdf|zip|rar|tar|gz|7z'

            > "$FOLDER/media_links.txt"
            > "$FOLDER/other_links.txt"
            > "$FOLDER/downloaded_media.md"
            echo "## Downloaded Media Files" > "$FOLDER/downloaded_media.md"
            echo "" >> "$FOLDER/downloaded_media.md"

            BASE_PROTOCOL_DOMAIN="$(echo "$URL" | awk -F/ '{print $1"//"$3}')"

            while IFS= read -r link; do
              [[ -z "$link" || "$link" =~ ^# ]] && continue
              if [[ "$link" =~ ^https?:// ]]; then
                ABS_URL="$link"
              elif [[ "$link" = /* ]]; then
                ABS_URL="${BASE_PROTOCOL_DOMAIN}${link}"
              else
                ABS_URL="${BASE_PROTOCOL_DOMAIN}/${link}"
              fi

              ext="${link##*.}"
              ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')

              if echo "$ext_lower" | grep -Eq "^($MEDIA_EXT)$"; then
                echo "Downloading: $ABS_URL"
                SAFE_NAME=$(basename "$link" | sed 's/[?#].*//; s/[^a-zA-Z0-9._-]/_/g')
                [[ ! -f "$MEDIA_DIR/$SAFE_NAME" ]] || SAFE_NAME="dup_$(date +%s)_${SAFE_NAME}"

                if curl -sSL --retry 2 --max-time 60 -o "$MEDIA_DIR/$SAFE_NAME" "$ABS_URL"; then
                  SIZE=$(stat -c%s "$MEDIA_DIR/$SAFE_NAME" 2>/dev/null || echo 0)
                  if [[ "$SIZE" -gt 0 ]]; then
                    echo "$link" >> "$FOLDER/media_links.txt"
                    if [[ "$ext_lower" =~ ^(png|jpg|jpeg|gif|svg|webp)$ ]]; then
                      echo "![$SAFE_NAME](./media/$SAFE_NAME)" >> "$FOLDER/downloaded_media.md"
                    else
                      echo "- [$SAFE_NAME](./media/$SAFE_NAME) (${SIZE} bytes)" >> "$FOLDER/downloaded_media.md"
                    fi
                    echo "  OK: $SAFE_NAME"
                  fi
                else
                  echo "  Failed: $ABS_URL"
                fi
              else
                echo "$link" >> "$FOLDER/other_links.txt"
              fi
            done < "$FOLDER/all_links.txt"
            MEDIA_COUNT=$(find "$MEDIA_DIR" -type f 2>/dev/null | wc -l)
            echo "Media downloaded: $MEDIA_COUNT files"
          else
            MEDIA_COUNT=0
            touch "$FOLDER/all_links.txt"
            echo "" > "$FOLDER/downloaded_media.md"
          fi

          # ساخت index.md داخل پوشه (درون ZIP باقی می‌ماند)
          {
            echo "# Downloaded page"
            echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            if $SCREENSHOT_OK && [[ -f "$FOLDER/screenshot.png" ]]; then
              echo "## Screenshot"
              echo "![Screenshot](./screenshot.png)"
              echo ""
            fi
            echo "## HTML Source"
            echo "[page.html](./page.html)  ($(wc -c < "$FOLDER/page.html") bytes)"
            if [ "$SAVE_MHTML" = "true" ] && [ -f "$FOLDER/page.mhtml" ]; then
              echo "[page.mhtml](./page.mhtml)  ($(wc -c < "$FOLDER/page.mhtml") bytes)"
            fi
            echo ""
            if [ "$DOWNLOAD_MEDIA" = "true" ]; then
              echo "## Downloaded Media ($MEDIA_COUNT files)"
              if [[ "$MEDIA_COUNT" -gt 0 ]]; then
                cat "$FOLDER/downloaded_media.md"
              else
                echo "_No media files downloaded_"
              fi
              echo ""
              echo "## Other Links"
              if [[ -s "$FOLDER/other_links.txt" ]]; then
                head -50 "$FOLDER/other_links.txt" | while IFS= read -r entry; do
                  echo "- [$entry]($entry)"
                done
              fi
            fi
            echo ""
            echo "## Stats"
            echo "- Links found: $(wc -l < "$FOLDER/all_links.txt")"
            echo "- Media downloaded: $MEDIA_COUNT"
          } > "$FOLDER/index.md"

          echo "FOLDER_NAME=$FOLDER_NAME" >> $GITHUB_ENV
          echo "DATE_UTC=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV
          echo "Session complete."

      - name: Package and optionally split
        if: success()
        env:
          ZIP_PASSWORD: ${{ github.event.inputs.zip_password }}
          SPLIT_SIZE_MB: ${{ github.event.inputs.split_size }}
        run: |
          FOLDER_NAME="${{ env.FOLDER_NAME }}"
          DATE_UTC="${{ env.DATE_UTC }}"
          SPLIT_SIZE_MB="${SPLIT_SIZE_MB:-0}"
          if ! [[ "$SPLIT_SIZE_MB" =~ ^[0-9]+$ ]] || [ "$SPLIT_SIZE_MB" -le 0 ]; then
            SPLIT_SIZE_MB=0
          fi

          cd pages
          if [ ! -d "$FOLDER_NAME" ]; then
            echo "Folder not found!"
            exit 1
          fi

          TOTAL_SIZE=$(du -sb "$FOLDER_NAME" | cut -f1)
          ZIP_NAME="${FOLDER_NAME}.zip"

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          if [ "$SPLIT_SIZE_MB" -gt 0 ] && [ "$TOTAL_SIZE" -gt $((SPLIT_SIZE_MB * 1024 * 1024)) ]; then
            echo "Total size $(echo "scale=2; $TOTAL_SIZE/1048576" | bc) MB exceeds ${SPLIT_SIZE_MB}MB – splitting..."
            if [ -n "$ZIP_PASSWORD" ]; then
              zip -s ${SPLIT_SIZE_MB}m -r -P "$ZIP_PASSWORD" "${ZIP_NAME}" "$FOLDER_NAME"
            else
              zip -s ${SPLIT_SIZE_MB}m -r "${ZIP_NAME}" "$FOLDER_NAME"
            fi
            PARTS=$(ls ${FOLDER_NAME}.z[0-9]* ${ZIP_NAME} 2>/dev/null | sort)
            TOTAL_ARCHIVE_SIZE=0
            for part in $PARTS; do
              TOTAL_ARCHIVE_SIZE=$((TOTAL_ARCHIVE_SIZE + $(stat -c%s "$part")))
            done
            SIZE_MB=$(echo "scale=2; $TOTAL_ARCHIVE_SIZE/1048576" | bc)
          else
            echo "Creating single zip (no split)..."
            if [ -n "$ZIP_PASSWORD" ]; then
              zip -qr -P "$ZIP_PASSWORD" "${ZIP_NAME}" "$FOLDER_NAME"
            else
              zip -qr "${ZIP_NAME}" "$FOLDER_NAME"
            fi
            PARTS="${ZIP_NAME}"
            TOTAL_ARCHIVE_SIZE=$(stat -c%s "${ZIP_NAME}")
            SIZE_MB=$(echo "scale=2; $TOTAL_ARCHIVE_SIZE/1048576" | bc)
          fi

          rm -rf "$FOLDER_NAME"

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          BASE_URL="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/refs/heads/${BRANCH}/pages"

          {
            echo "# Downloaded page"
            echo ""
            echo "**Date:** ${DATE_UTC}"
            echo ""
            echo "## Download"
            echo ""
            if echo "$PARTS" | grep -q '\.z[0-9]'; then
              echo "Archive split into multiple parts (${SPLIT_SIZE_MB} MB each):"
              echo ""
              echo "| # | File | Download |"
              echo "|---|------|----------|"
              i=1
              for part in $PARTS; do
                echo "| $i | \`$part\` | [📥](${BASE_URL}/$(urlencode "$part")) |"
                i=$((i+1))
              done
              echo ""
              echo "**Total size:** ${SIZE_MB} MB"
              echo ""
              echo "**To extract:** Download all parts and open \`${ZIP_NAME}\` with 7-Zip or WinRAR."
            else
              echo "Single archive: [${ZIP_NAME}](${BASE_URL}/$(urlencode "${ZIP_NAME}"))"
              echo ""
              echo "**Size:** ${SIZE_MB} MB"
            fi
            if [ -n "$ZIP_PASSWORD" ]; then
              echo ""
              echo "**Password:** \`***\` (set by user)"
            fi
            echo ""
            echo "---"
            echo "*Generated by GitHub Actions*"
          } > "${FOLDER_NAME}.md"

          BROWSE_FILE="../browse.md"
          if [[ ! -f "$BROWSE_FILE" ]]; then
            echo "# Browsed Websites" > "$BROWSE_FILE"
            echo "" >> "$BROWSE_FILE"
          fi
          echo "- [${SIZE_MB} MB](./pages/${FOLDER_NAME}.md)" >> "$BROWSE_FILE"

          cd "$GITHUB_WORKSPACE"

      - name: Commit and push results
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add pages/ browse.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "[Browse] Session ${{ env.FOLDER_NAME }} [skip ci]"
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin HEAD:"${{ github.ref_name }}"