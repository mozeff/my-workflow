name: 🌐 4-Browse the Web

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to visit'
        required: true
        type: string

jobs:
  browse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl zip

      - name: Setup Node.js and Puppeteer
        run: |
          npm init -y > /dev/null
          npm install puppeteer > /dev/null

      - name: Create screenshot script
        run: |
          cat > screenshot.js << 'EOF'
          const puppeteer = require('puppeteer');
          const url = process.argv[2];
          const outputPath = process.argv[3];

          (async () => {
            const browser = await puppeteer.launch({
              headless: 'new',
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 720 });

            try {
              await page.goto(url, { waitUntil: 'networkidle2', timeout: 30000 });
              await page.screenshot({ path: outputPath, fullPage: true });
              console.log('Screenshot saved successfully');
            } catch (err) {
              console.error('Screenshot error:', err.message);
              process.exitCode = 1;
            } finally {
              await browser.close();
            }
          })();
          EOF

      - name: Browse URL and collect media
        shell: bash
        run: |
          set -euo pipefail
          RAW_URL="${{ github.event.inputs.url }}"

          # Normalize URL: add protocol if missing
          if [[ ! "$RAW_URL" =~ ^https?:// ]]; then
            HTTPS_URL="https://$RAW_URL"
            if curl -fsL --connect-timeout 10 --max-time 30 -o /dev/null "$HTTPS_URL" 2>/dev/null; then
              URL="$HTTPS_URL"
              echo "Using HTTPS: $URL"
            else
              URL="http://$RAW_URL"
              echo "Falling back to HTTP: $URL"
            fi
          else
            URL="$RAW_URL"
          fi

          # --- توابع برای تولید نام تصادفی عددی ---
          generate_random_numeric_name() {
            local PART1=$(( RANDOM * 32768 + RANDOM ))
            local PART2=$(( RANDOM * 32768 + RANDOM ))
            echo "${PART1}${PART2}"
          }

          get_unique_numeric_folder() {
            local CANDIDATE
            while true; do
              CANDIDATE=$(generate_random_numeric_name)
              # بررسی عدم وجود پوشه در pages/
              if [ ! -d "pages/$CANDIDATE" ] && [ ! -d "/tmp/${CANDIDATE}" ]; then
                echo "$CANDIDATE"
                return
              fi
            done
          }
          # --- پایان توابع ---

          FOLDER_NAME=$(get_unique_numeric_folder)
          FOLDER="pages/$FOLDER_NAME"
          MEDIA_DIR="$FOLDER/media"
          mkdir -p "$FOLDER" "$MEDIA_DIR"

          echo "Visiting $URL"
          echo "Saving to $FOLDER"

          # Download HTML page
          curl -sSL -A "Mozilla/5.0" -o "$FOLDER/page.html" "$URL" || {
            echo "Failed to download HTML, creating placeholder"
            echo "<html><body>Failed to load $URL</body></html>" > "$FOLDER/page.html"
          }

          # Take screenshot (non-fatal)
          SCREENSHOT_OK=false
          if node screenshot.js "$URL" "$FOLDER/screenshot.png"; then
            SCREENSHOT_OK=true
          else
            echo "Screenshot skipped or failed"
          fi

          # Extract all links (href and src)
          grep -ohP '(?:href|src)="\K[^"]*' "$FOLDER/page.html" | sort -u > "$FOLDER/all_links.txt"

          # Media extensions to download
          MEDIA_EXT='png|jpg|jpeg|gif|svg|webp|bmp|ico|mp3|wav|ogg|flac|aac|mp4|webm|avi|mov|mkv|pdf|zip|rar|tar|gz|7z'

          # Resolve absolute URLs and download media
          > "$FOLDER/media_links.txt"
          > "$FOLDER/other_links.txt"
          > "$FOLDER/downloaded_media.md"
          echo "## Downloaded Media Files" > "$FOLDER/downloaded_media.md"
          echo "" >> "$FOLDER/downloaded_media.md"

          BASE_PROTOCOL_DOMAIN="$(echo "$URL" | awk -F/ '{print $1"//"$3}')"

          while IFS= read -r link; do
            [[ -z "$link" || "$link" =~ ^# ]] && continue
            # Resolve relative URLs
            if [[ "$link" =~ ^https?:// ]]; then
              ABS_URL="$link"
            elif [[ "$link" = /* ]]; then
              ABS_URL="${BASE_PROTOCOL_DOMAIN}${link}"
            else
              ABS_URL="${BASE_PROTOCOL_DOMAIN}/${link}"
            fi

            ext="${link##*.}"
            ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')

            if echo "$ext_lower" | grep -Eq "^($MEDIA_EXT)$"; then
              echo "Downloading: $ABS_URL"
              SAFE_NAME=$(basename "$link" | sed 's/[?#].*//; s/[^a-zA-Z0-9._-]/_/g')
              # Avoid overwriting by prefixing with timestamp if needed
              [[ ! -f "$MEDIA_DIR/$SAFE_NAME" ]] || SAFE_NAME="dup_$(date +%s)_${SAFE_NAME}"

              if curl -sSL --retry 2 --max-time 60 -o "$MEDIA_DIR/$SAFE_NAME" "$ABS_URL"; then
                SIZE=$(stat -c%s "$MEDIA_DIR/$SAFE_NAME" 2>/dev/null || echo 0)
                if [[ "$SIZE" -gt 0 ]]; then
                  echo "$link" >> "$FOLDER/media_links.txt"
                  if [[ "$ext_lower" =~ ^(png|jpg|jpeg|gif|svg|webp)$ ]]; then
                    echo "![$SAFE_NAME](./media/$SAFE_NAME)" >> "$FOLDER/downloaded_media.md"
                  else
                    echo "- [$SAFE_NAME](./media/$SAFE_NAME) (${SIZE} bytes)" >> "$FOLDER/downloaded_media.md"
                  fi
                  echo "  OK: $SAFE_NAME"
                fi
              else
                echo "  Failed: $ABS_URL"
              fi
            else
              echo "$link" >> "$FOLDER/other_links.txt"
            fi
          done < "$FOLDER/all_links.txt"

          # Create index.md with summary
          MEDIA_COUNT=$(find "$MEDIA_DIR" -type f 2>/dev/null | wc -l)
          {
            echo "# Visited: $URL"
            echo "**Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo ""
            if $SCREENSHOT_OK && [[ -f "$FOLDER/screenshot.png" ]]; then
              echo "## Screenshot"
              echo "![Screenshot](./screenshot.png)"
              echo ""
            fi
            echo "## Raw HTML"
            echo "[page.html](./page.html)"
            echo ""
            echo "## Downloaded Media ($MEDIA_COUNT files)"
            if [[ "$MEDIA_COUNT" -gt 0 ]]; then
              cat "$FOLDER/downloaded_media.md"
            else
              echo "_No media files downloaded_"
            fi
            echo ""
            echo "## Other Links"
            if [[ -s "$FOLDER/other_links.txt" ]]; then
              head -50 "$FOLDER/other_links.txt" | while IFS= read -r entry; do
                echo "- [$entry]($entry)"
              done
            fi
            echo ""
            echo "## Stats"
            echo "- Links found: $(wc -l < "$FOLDER/all_links.txt")"
            echo "- Media downloaded: $MEDIA_COUNT"
          } > "$FOLDER/index.md"

          # Update browse history file (with random numeric name)
          BROWSE_FILE="browse.md"
          if [[ ! -f "$BROWSE_FILE" ]]; then
            echo "# Browsed Websites" > "$BROWSE_FILE"
            echo "" >> "$BROWSE_FILE"
          fi
          echo "- [${FOLDER_NAME}]($FOLDER/index.md) — $MEDIA_COUNT media files — $URL" >> "$BROWSE_FILE"

          # Save variable for later steps
          echo "FOLDER_NAME=$FOLDER_NAME" >> $GITHUB_ENV

          echo "Done: $MEDIA_COUNT media files saved."

      - name: Create zip archive of the folder
        if: success()
        run: |
          FOLDER_NAME="${{ env.FOLDER_NAME }}"
          cd pages
          if [ -d "$FOLDER_NAME" ]; then
            zip -qr "${FOLDER_NAME}.zip" "$FOLDER_NAME"
          fi
          cd "$GITHUB_WORKSPACE"

      - name: Commit and push results
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add pages/ browse.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "[Browse] Saved visit to ${{ github.event.inputs.url }} [skip ci]"
          git pull --rebase origin "${{ github.ref_name }}"
          git push origin HEAD:"${{ github.ref_name }}"