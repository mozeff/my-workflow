name: 🎬 05-YouTube Downloader-S2

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Video quality (if not audio only)'
        required: false
        default: '480'
        type: choice
        options:
          - '144'
          - '240'
          - '360'
          - '480'
          - '720'
          - '1080'
          - '1440'
          - '2160'
          - 'best'
      audio_only:
        description: 'Download audio only (ignore quality setting)'
        required: false
        default: false
        type: boolean
      compression_level:
        description: '7z compression level (0=store, 9=ultra)'
        required: false
        default: 0
        type: number
      password:
        description: 'Password for 7z archives (optional)'
        required: false
        default: ''
        type: string
      split_size:
        description: 'حداکثر حجم هر پارت (مگابایت) – پیش‌فرض ۸۰'
        required: false
        default: '80'
        type: string

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Start Cloudflare WARP proxy
        run: |
          echo "Starting Cloudflare WARP container..."

          docker network create warp-net 2>/dev/null || true

          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "Waiting for WARP to initialize (30 seconds)..."
          sleep 30

          echo "Checking WARP status..."
          for i in {1..10}; do
            RESULT=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              echo "$RESULT"
              break
            else
              echo "Attempt $i/10 - WARP not ready yet, waiting..."
              sleep 10
            fi
          done

          FINAL=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
          if echo "$FINAL" | grep -qE "warp=(on|plus)"; then
            echo "WARP proxy is ready!"
          else
            echo "WARP might not be fully active, but continuing anyway..."
            echo "Response: $FINAL"
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip ffmpeg zip p7zip-full curl jq bc unzip

          # Deno (required by yt-dlp for n-challenge solving)
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          deno --version

          pip3 install --upgrade yt-dlp

      - name: Download YouTube video/audio
        run: |
          set -euo pipefail
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          AUDIO_ONLY="${{ github.event.inputs.audio_only }}"
          COMPRESSION="${{ github.event.inputs.compression_level }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          SPLIT_SIZE_MB="${{ github.event.inputs.split_size }}"

          # Validate compression level (0-9)
          if [ "$COMPRESSION" -lt 0 ]; then
            COMPRESSION=0
          elif [ "$COMPRESSION" -gt 9 ]; then
            COMPRESSION=9
          fi

          # Validate split size (1-90 MB, safe limit for GitHub)
          if ! [[ "$SPLIT_SIZE_MB" =~ ^[0-9]+$ ]] || [ "$SPLIT_SIZE_MB" -lt 1 ]; then
            SPLIT_SIZE_MB=80
          elif [ "$SPLIT_SIZE_MB" -gt 90 ]; then
            SPLIT_SIZE_MB=90
          fi
          SPLIT_BYTES=$(( SPLIT_SIZE_MB * 1024 * 1024 ))

          mkdir -p tmp_dl

          echo "Downloading: $URL"
          echo "Audio only: $AUDIO_ONLY"
          echo "Quality: $QUALITY (ignored if audio only)"
          echo "Compression level: $COMPRESSION (mx=$COMPRESSION)"
          echo "Split size: $SPLIT_SIZE_MB MB"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "Password protection: ENABLED"
          else
            echo "Password protection: DISABLED"
          fi

          sanitize_name() {
            echo "$1" | sed 's/ /-/g; s/　/-/g' | tr -s '-'
          }

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          # Build format and flags
          if [ "$AUDIO_ONLY" = "true" ]; then
            FORMAT="bestaudio[ext=m4a]/bestaudio"
            DOWNLOAD_TYPE="audio"
          else
            case "$QUALITY" in
              144)  FORMAT="bestvideo[height<=144][ext=mp4]+bestaudio[ext=m4a]/best[height<=144][ext=mp4]/best" ;;
              240)  FORMAT="bestvideo[height<=240][ext=mp4]+bestaudio[ext=m4a]/best[height<=240][ext=mp4]/best" ;;
              360)  FORMAT="bestvideo[height<=360][ext=mp4]+bestaudio[ext=m4a]/best[height<=360][ext=mp4]/best" ;;
              480)  FORMAT="bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480][ext=mp4]/best" ;;
              720)  FORMAT="bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720][ext=mp4]/best" ;;
              1080) FORMAT="bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080][ext=mp4]/best" ;;
              1440) FORMAT="bestvideo[height<=1440][ext=mp4]+bestaudio[ext=m4a]/best[height<=1440][ext=mp4]/best" ;;
              2160) FORMAT="bestvideo[height<=2160][ext=mp4]+bestaudio[ext=m4a]/best[height<=2160][ext=mp4]/best" ;;
              best)  FORMAT="bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" ;;
              *)     FORMAT="bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480][ext=mp4]/best" ;;
            esac
            DOWNLOAD_TYPE="video"
          fi

          COMMON_FLAGS="--output tmp_dl/%(title)s.%(ext)s --merge-output-format mp4 --no-part --no-playlist --retries 10 --fragment-retries 10 --no-check-certificates"

          METHODS=(
            "--proxy socks5://127.0.0.1:1080 --extractor-args youtube:player_client=mweb --concurrent-fragments 4"
            "--proxy socks5://127.0.0.1:1080 --extractor-args youtube:player_client=android --user-agent 'Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36' --concurrent-fragments 4"
            "--proxy socks5://127.0.0.1:1080 --extractor-args youtube:player_client=mweb,android --concurrent-fragments 4"
            "--proxy socks5://127.0.0.1:1080 --extractor-args youtube:player_client=web --js-runtimes deno --user-agent 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36' --add-header Accept-Language:en-US,en;q=0.9"
            "--proxy socks5://127.0.0.1:1080 --extractor-args youtube:player_client=android_vr --concurrent-fragments 4"
            "--extractor-args youtube:player_client=mweb --concurrent-fragments 4"
            "--extractor-args youtube:player_client=android --concurrent-fragments 4"
            "--proxy socks5://127.0.0.1:1080 --extractor-args youtube:player_client=mweb,android,android_vr --concurrent-fragments 4"
          )

          DOWNLOAD_SUCCESS=false
          for idx in "${!METHODS[@]}"; do
            METHOD_NUM=$((idx+1))
            echo "Trying download method $METHOD_NUM/${#METHODS[@]}..."
            if yt-dlp --format "$FORMAT" $COMMON_FLAGS ${METHODS[$idx]} "$URL"; then
              DOWNLOAD_SUCCESS=true
              echo "Download successful with method $METHOD_NUM!"
              break
            else
              echo "Method $METHOD_NUM failed, waiting before next attempt..."
              sleep $((RANDOM % 10 + 5))
            fi
          done

          if ! $DOWNLOAD_SUCCESS; then
            echo "❌ All download methods failed."
            rm -rf tmp_dl
            exit 1
          fi

          # Verify at least one valid file exists
          DOWNLOADED_FILE=$(ls tmp_dl/* 2>/dev/null | head -1)
          if [ -z "$DOWNLOADED_FILE" ] || [ ! -s "$DOWNLOADED_FILE" ]; then
            echo "❌ No valid file downloaded."
            rm -rf tmp_dl
            exit 1
          fi

          echo "Download successful. Temporary files:"
          ls -la tmp_dl/

          # Move to final location
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          generate_random_numeric_name() {
            local PART1=$(( RANDOM * 32768 + RANDOM ))
            local PART2=$(( RANDOM * 32768 + RANDOM ))
            echo "${PART1}${PART2}"
          }

          get_unique_numeric_folder() {
            local CANDIDATE
            while true; do
              CANDIDATE=$(generate_random_numeric_name)
              if [ ! -d "videos/$CANDIDATE" ]; then
                echo "$CANDIDATE"
                return
              fi
            done
          }

          FINAL_FOLDER=$(get_unique_numeric_folder)
          FINAL_PATH="videos/$FINAL_FOLDER"
          mkdir -p "$FINAL_PATH"

          # Process the first (and only) downloaded file
          FILE="$DOWNLOADED_FILE"
          SIZE=$(stat -c%s "$FILE")
          BASENAME=$(basename "$FILE")
          FILENAME_NO_EXT="${BASENAME%.*}"
          EXT="${BASENAME##*.}"
          FILENAME_NO_EXT=$(sanitize_name "$FILENAME_NO_EXT")

          echo "Processing: $BASENAME ($(( SIZE / 1024 / 1024 ))MB)"

          FOLDER_ENCODED=$(urlencode "$FINAL_FOLDER")
          COMPRESS_FLAG="-mx=${COMPRESSION}"

          if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
            echo "Splitting into ${SPLIT_SIZE_MB}MB parts..."
            ARCHIVE_BASE="$FINAL_PATH/${FINAL_FOLDER}"
            if [ -n "$ZIP_PASSWORD" ]; then
              7z a -v${SPLIT_SIZE_MB}m -p"${ZIP_PASSWORD}" -mhe=on ${COMPRESS_FLAG} "${ARCHIVE_BASE}.7z" "$FILE"
            else
              7z a -v${SPLIT_SIZE_MB}m ${COMPRESS_FLAG} "${ARCHIVE_BASE}.7z" "$FILE"
            fi

            PART_COUNT=$(ls "$FINAL_PATH/"*.7z* 2>/dev/null | wc -l)
            TOTAL_SIZE=0
            for part_file in "$FINAL_PATH"/*; do
              [ -f "$part_file" ] && TOTAL_SIZE=$((TOTAL_SIZE + $(stat -c%s "$part_file")))
            done
            TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)

            # README
            {
              echo "# ${FILENAME_NO_EXT}"
              echo ""
              echo "---"
              echo "## ${DOWNLOAD_TYPE^} Information"
              echo ""
              echo "| Property | Value |"
              echo "|----------|-------|"
              echo "| **Name** | \`${FILENAME_NO_EXT}\` |"
              echo "| **Original Link** | [YouTube ${DOWNLOAD_TYPE^}](${URL}) |"
              echo "| **Total Size** | **${PART_COUNT} parts** - **${TOTAL_SIZE_MB} MB** |"
              [ "$AUDIO_ONLY" != "true" ] && echo "| **Quality** | **${QUALITY}** |" || echo "| **Type** | **Audio only** |"
              echo "| **Compression** | **level ${COMPRESSION}** |"
              echo "| **Status** | ✅ Complete |"
              echo "| **Password Protected** | **$( [ -n "$ZIP_PASSWORD" ] && echo "YES" || echo "NO" )** |"
              echo ""
              echo "---"
              echo "## Download Links"
              echo ""
              echo "| # | File | Link |"
              echo "|---|------|------|"
              LINK_NUM=0
              for part_file in $(ls "$FINAL_PATH/"*.7z* 2>/dev/null | sort); do
                [ -f "$part_file" ] || continue
                PART_BASENAME=$(basename "$part_file")
                PART_ENCODED=$(urlencode "$PART_BASENAME")
                RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/videos/${FOLDER_ENCODED}/${PART_ENCODED}"
                LINK_NUM=$((LINK_NUM + 1))
                echo "| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"
              done
              echo ""
              echo "---"
              echo "## How to Extract"
              echo "1. Download all parts to the same folder"
              echo "2. Open \`.7z.001\` with [7-Zip](https://www.7-zip.org/) or [Keka](https://www.keka.io/)"
              [ -n "$ZIP_PASSWORD" ] && echo "3. Enter the password when prompted"
            } > "$FINAL_PATH/README.md"

          else
            if [ -n "$ZIP_PASSWORD" ]; then
              echo "Creating password-protected archive..."
              7z a -p"${ZIP_PASSWORD}" -mhe=on ${COMPRESS_FLAG} "$FINAL_PATH/${FINAL_FOLDER}.7z" "$FILE"
              ARCHIVE_EXT="7z"
            else
              cp "$FILE" "$FINAL_PATH/${FINAL_FOLDER}.${EXT}"
              ARCHIVE_EXT="${EXT}"
            fi

            SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
            FILE_ENCODED=$(urlencode "${FINAL_FOLDER}.${ARCHIVE_EXT}")
            RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/videos/${FOLDER_ENCODED}/${FILE_ENCODED}"

            {
              echo "# ${FILENAME_NO_EXT}"
              echo ""
              echo "---"
              echo "## ${DOWNLOAD_TYPE^} Information"
              echo ""
              echo "| Property | Value |"
              echo "|----------|-------|"
              echo "| **Name** | \`${FILENAME_NO_EXT}\` |"
              echo "| **Original Link** | [YouTube ${DOWNLOAD_TYPE^}](${URL}) |"
              echo "| **Size** | ${SIZE_MB} MB |"
              [ "$AUDIO_ONLY" != "true" ] && echo "| **Quality** | **${QUALITY}** |" || echo "| **Type** | **Audio only** |"
              echo "| **Compression** | **level ${COMPRESSION}** |"
              echo "| **Status** | ✅ Complete |"
              echo "| **Password Protected** | **$( [ -n "$ZIP_PASSWORD" ] && echo "YES" || echo "NO" )** |"
              echo ""
              echo "---"
              echo "## Download Link"
              echo "| File | Link |"
              echo "|------|------|"
              echo "| \`${FINAL_FOLDER}.${ARCHIVE_EXT}\` | [⬇️ Download](${RAW_LINK}) |"
              if [ "$ARCHIVE_EXT" = "7z" ]; then
                echo ""
                echo "## How to Extract"
                echo "1. Install [7-Zip](https://www.7-zip.org/) or [Keka](https://www.keka.io/)"
                echo "2. Right-click the \`.7z\` file → Extract Here"
                [ -n "$ZIP_PASSWORD" ] && echo "3. Enter the password when prompted"
              else
                echo ""
                echo "> Ready to use – no extraction needed."
              fi
            } > "$FINAL_PATH/README.md"
          fi

          rm -rf tmp_dl

          # Create Links.md
          {
            echo "# 📥 YouTube Download"
            echo ""
            echo "**File:** ${FILENAME_NO_EXT}.${ARCHIVE_EXT:-7z}"
            echo "**Size:** ${SIZE_MB:-?} MB"
            echo "**Status:** ✅ Downloaded"
            echo ""
            echo "➡️ [Open folder](./videos/${FOLDER_ENCODED})"
          } > Links.md

          echo "✅ File saved to videos/$FINAL_FOLDER"

      - name: Stop Cloudflare WARP container
        if: always()
        run: |
          docker stop warp 2>/dev/null || true
          docker rm warp 2>/dev/null || true

      - name: Commit and push files
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add videos/ Links.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "📥 YouTube download [skip ci]" || true

          for i in 1 2 3 4 5; do
            if timeout 120 git push origin HEAD:"$BRANCH"; then
              echo "✅ Push successful"
              exit 0
            fi
            echo "⚠️ Push failed, retrying after pull..."
            git pull --rebase origin "$BRANCH" || git pull origin "$BRANCH" --no-rebase
            sleep $((2 + RANDOM % 5))
            git add videos/ Links.md
            git commit -m "📥 YouTube download [skip ci]" || true
          done
          echo "❌ Push failed after 5 attempts"
          exit 1