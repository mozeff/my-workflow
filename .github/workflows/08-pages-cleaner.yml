name: 🗑 Clean Pages folder

on:
  workflow_dispatch:
    inputs:
      warning:
        description: '⚠️ WARNING: This will DELETE the entire pages/ folder and recreate it. Only proceed if you are sure.'
        required: false
        default: 'Read this warning before proceeding'

jobs:
  clean-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Recreate pages folder with README
        run: |
          rm -rf pages
          mkdir pages
          cat > pages/README.md << 'EOF'
          # Pages
          
          ---
          
          The folder is empty. Start browsing websites using the available workflows to save pages here.
          
          ---
          EOF
          echo "Pages folder cleaned and README.md added."

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add pages/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "[Clean] Clear pages folder [skip ci]"
            git pull --rebase origin "${{ github.ref_name }}"
            git push origin HEAD:"${{ github.ref_name }}"
            echo "✅ Pages folder has been cleaned and committed."
          fi