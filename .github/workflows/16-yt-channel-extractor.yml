name: 🎬 07-Channel Link Extractor

on:
  workflow_dispatch:
    inputs:
      channel_url:
        description: 'YouTube channel URL (e.g., https://www.youtube.com/@channel/videos)'
        required: true
        type: string
      num_links:
        description: 'Number of video links to extract'
        required: true
        default: 50
        type: number

jobs:
  extract-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install yt-dlp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip
          pip3 install --upgrade yt-dlp

      - name: Extract video links from channel
        run: |
          CHANNEL_URL="${{ github.event.inputs.channel_url }}"
          NUM_LINKS="${{ github.event.inputs.num_links }}"

          echo "Extracting up to ${NUM_LINKS} video links from: ${CHANNEL_URL}"

          # Generate the list using yt-dlp with flat playlist
          LINKS_FILE="/tmp/channel_links.md"
          {
            echo "# Video Links from ${CHANNEL_URL}"
            echo ""
            echo "Total requested: ${NUM_LINKS}"
            echo ""
            echo "| # | Title | Link |"
            echo "|---|-------|------|"
          } > "$LINKS_FILE"

          INDEX=1
          while IFS='|' read -r TITLE URL; do
            if [ -n "$TITLE" ] && [ -n "$URL" ]; then
              printf "| %d | %s | [Watch](%s) |\n" "$INDEX" "$TITLE" "$URL" >> "$LINKS_FILE"
              INDEX=$((INDEX + 1))
            fi
          done < <(yt-dlp --flat-playlist --playlist-end "$NUM_LINKS" \
                     --print "%(title)s|%(webpage_url)s" \
                     "$CHANNEL_URL" 2>/dev/null || echo "Failed to extract.")

          echo "" >> "$LINKS_FILE"
          echo "*Generated by GitHub Actions*" >> "$LINKS_FILE"

          # Show the result in the logs
          cat "$LINKS_FILE"

          # Prepare output folder for commit
          mkdir -p lists
          cp "$LINKS_FILE" lists/channel_links.md

      - name: Commit and push list to repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          BRANCH="${GITHUB_REF_NAME}"

          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"

          mkdir -p lists
          cp /tmp/channel_links.md lists/channel_links.md

          git add lists/channel_links.md

          if git diff --cached --quiet; then
            echo "No changes to push."
            exit 0
          fi

          git commit -m "[Channel Links] Extracted video links [skip ci]"

          RETRY_MAX=10
          for ((i=1; i<=RETRY_MAX; i++)); do
            echo "Push attempt $i/$RETRY_MAX"
            if git push origin HEAD:"$BRANCH" 2>&1; then
              echo "Push successful!"
              exit 0
            else
              WAIT=$((2 + RANDOM % 8))
              echo "Push failed, retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done

          echo "All push attempts failed."
          exit 1