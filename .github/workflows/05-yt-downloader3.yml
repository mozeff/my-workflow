name: 🎬 06-YouTube Downloader3 (Integrated API for 720/1080)

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Video quality (if not audio only)'
        required: false
        default: '480'
        type: choice
        options:
          - '144'
          - '240'
          - '360'
          - '480'
          - '720'
          - '1080'
          - '1440'
          - '2160'
          - 'best'
      audio_only:
        description: 'Download audio only (ignore quality setting)'
        required: false
        default: false
        type: boolean
      compression_level:
        description: '7z compression level (0=store, 9=ultra)'
        required: false
        default: 0
        type: number
      password:
        description: 'Password for 7z archives (optional)'
        required: false
        default: ''
        type: string
      use_cookies:
        description: 'Use YouTube cookies to bypass age restriction and SABR (requires YOUTUBE_COOKIES secret)'
        required: false
        default: false
        type: boolean
      strict_quality:
        description: 'Fail if exact quality is unavailable (otherwise fallback to best ≤ requested)'
        required: false
        default: false
        type: boolean
      split_size:
        description: 'Max size per part (MB) – file will be split if larger (default 90)'
        required: false
        default: '90'
        type: string
      use_public_proxy:
        description: 'Use a tested working public SOCKS5 proxy as final fallback'
        required: false
        default: false
        type: boolean
      proxy_test_count:
        description: 'Max proxies to test (number, or "all" to test the entire list) – used only if public proxy enabled'
        required: false
        default: '10'
        type: string

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Start Cloudflare WARP proxy
        run: |
          echo "Starting Cloudflare WARP container..."
          docker network create warp-net 2>/dev/null || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "Waiting for WARP to initialize (30 seconds)..."
          sleep 30
          echo "Checking WARP status..."
          for i in {1..10}; do
            RESULT=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              echo "$RESULT"
              break
            else
              echo "Attempt $i/10 - WARP not ready yet, waiting..."
              sleep 10
            fi
          done
          FINAL=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
          if echo "$FINAL" | grep -qE "warp=(on|plus)"; then
            echo "WARP proxy is ready!"
          else
            echo "WARP might not be fully active, continuing anyway..."
            echo "Response: $FINAL"
          fi

      - name: Start PO Token Provider
        run: |
          echo "Starting PO Token Provider container..."
          docker run -d \
            --name bgutil-provider \
            -p 4416:4416 \
            brainicism/bgutil-ytdlp-pot-provider:latest
          echo "Waiting for provider to be ready..."
          for i in {1..10}; do
            if curl -s http://127.0.0.1:4416/pot >/dev/null 2>&1; then
              echo "PO Token Provider is ready!"
              break
            else
              echo "Attempt $i/10 - provider not ready, waiting 5s..."
              sleep 5
            fi
          done
          if curl -s http://127.0.0.1:4416/pot >/dev/null; then
            echo "Provider confirmed working."
          else
            echo "::warning::PO Token Provider might not be ready. Downloads may fail."
          fi

      - name: Find working public proxy
        id: public_proxy
        if: ${{ github.event.inputs.use_public_proxy == 'true' }}
        run: |
          PROXY_LIST_URL="https://raw.githubusercontent.com/TheSpeedX/SOCKS-List/master/socks5.txt"
          echo "Fetching proxy list from $PROXY_LIST_URL ..."
          curl -sS --max-time 15 "$PROXY_LIST_URL" -o /tmp/socks5.txt
          if [ ! -s /tmp/socks5.txt ]; then
            echo "::warning::Failed to fetch proxy list. Public proxy fallback disabled."
            echo "proxy_available=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          mapfile -t PROXY_LIST < <(grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+:[0-9]+$' /tmp/socks5.txt | shuf)

          if [ ${#PROXY_LIST[@]} -eq 0 ]; then
            echo "::warning::No valid proxies found in list."
            echo "proxy_available=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          TEST_COUNT_INPUT="${{ github.event.inputs.proxy_test_count }}"
          MAX_TESTS=0
          if [[ "$TEST_COUNT_INPUT" =~ ^[0-9]+$ ]]; then
            MAX_TESTS=$((TEST_COUNT_INPUT))
            [ $MAX_TESTS -le 0 ] && MAX_TESTS=10
          elif [ "${TEST_COUNT_INPUT,,}" = "all" ]; then
            MAX_TESTS=${#PROXY_LIST[@]}
            echo "User chose to test all proxies (${MAX_TESTS} total)."
          else
            echo "::warning::Invalid proxy_test_count ('$TEST_COUNT_INPUT'), defaulting to 10."
            MAX_TESTS=10
          fi

          echo "Testing up to $MAX_TESTS random proxies for YouTube accessibility..."
          WORKING_PROXY=""
          TESTED=0

          for PROXY in "${PROXY_LIST[@]}"; do
            [ $TESTED -ge $MAX_TESTS ] && break
            TESTED=$((TESTED+1))
            echo "  [$TESTED/$MAX_TESTS] Testing $PROXY ..."
            if curl -sS --max-time 5 --socks5-hostname "$PROXY" -o /dev/null -w "%{http_code}" "https://www.youtube.com/" | grep -qE '^(200|301|302)$'; then
              WORKING_PROXY="$PROXY"
              echo "✅ Proxy $PROXY works!"
              break
            else
              echo "❌ $PROXY failed or timed out."
            fi
          done

          if [ -n "$WORKING_PROXY" ]; then
            echo "proxy_available=true" >> $GITHUB_OUTPUT
            echo "proxy_address=$WORKING_PROXY" >> $GITHUB_OUTPUT
          else
            echo "::warning::No working proxy found after $TESTED attempts."
            echo "proxy_available=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip ffmpeg zip p7zip-full curl jq bc unzip
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          deno --version
          pip3 install --upgrade yt-dlp requests   # ⭐ requests اضافه شد

      # ⭐ مرحله جدید: دانلود از طریق API برای کیفیت‌های ۷۲۰ و ۱۰۸۰
      - name: Download via API (720p/1080p)
        id: api_download
        if: ${{ (github.event.inputs.quality == '720' || github.event.inputs.quality == '1080') && github.event.inputs.audio_only != 'true' }}
        run: |
          mkdir -p api_downloads
          python3 << 'PYEOF'
          import os, sys, time, re, requests

          URL  = os.environ['INPUT_URL']
          QUAL = os.environ['INPUT_QUALITY']   # e.g., '720' or '1080'
          QUAL_API = f"{QUAL}p"                # API expects '720p' or '1080p'

          payload = {
              "url": URL,
              "os": "linux",
              "output": {
                  "type": "video",
                  "format": "mp4",
                  "quality": QUAL_API
              }
          }

          s = requests.Session()
          s.headers.update({"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)"})
          s.get("https://media.ytmp3.gg/")

          resp = s.post("https://hub.ytconvert.org/api/download", json=payload, timeout=30)
          resp.raise_for_status()
          data = resp.json()

          status_url = data.get('statusUrl')
          title = data.get('title', 'video')

          dl_url = None
          for _ in range(150):   # 5 دقیقه انتظار
              time.sleep(2)
              r = s.get(status_url, timeout=20)
              status = r.json()
              if status.get('status') == 'completed':
                  dl_url = status.get('downloadUrl')
                  break
              if status.get('status') == 'failed':
                  print("::error::API server failed to prepare the video")
                  sys.exit(1)

          if not dl_url:
              print("::error::Could not get download link from API")
              sys.exit(1)

          vid   = re.search(r'(?:v=|youtu\.be/)([a-zA-Z0-9_-]{11})', URL)[1]
          clean = re.sub(r'[^a-zA-Z0-9\-_()\[\]]', '_', title.replace(' ', '_'))
          clean = re.sub(r'_+', '_', clean).strip('_')[:70] or vid
          clean = clean.lstrip('-')
          fname = f"{clean}_{vid}_{QUAL_API}.mp4"

          # ذخیره اطلاعات برای مراحل بعدی
          with open("api_downloads/.info", "w") as f:
              f.write(f"{dl_url}\n{fname}\n{title}")
          PYEOF

          # دانلود واقعی فایل
          DL_URL=$(head -1 api_downloads/.info)
          FILENAME=$(sed -n '2p' api_downloads/.info)
          echo "Downloading via API: $FILENAME"
          curl -L --fail --progress-bar -o "api_downloads/$FILENAME" "$DL_URL"

          if [ -s "api_downloads/$FILENAME" ]; then
            echo "api_success=true" >> $GITHUB_OUTPUT
            echo "api_file=$(realpath api_downloads/$FILENAME)" >> $GITHUB_OUTPUT
            echo "API download succeeded."
          else
            echo "::warning::API download failed, falling back to yt-dlp"
            echo "api_success=false" >> $GITHUB_OUTPUT
          fi
        env:
          INPUT_URL: ${{ github.event.inputs.youtube_url }}
          INPUT_QUALITY: ${{ github.event.inputs.quality }}

      - name: Pre-check available video qualities
        id: quality_check
        # این مرحله فقط برای yt‑dlp لازم است، بنابراین وقتی API استفاده می‌شود اجرا نمی‌شود
        if: ${{ steps.api_download.outputs.api_success != 'true' }}
        run: |
          set -euo pipefail
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          AUDIO_ONLY="${{ github.event.inputs.audio_only }}"
          COOKIES_FILE=""
          if [ "${{ github.event.inputs.use_cookies }}" = "true" ] && [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" > ./cookies.txt
            COOKIES_FILE="--cookies ./cookies.txt"
          fi

          if [ "$AUDIO_ONLY" = "true" ] || [ "$QUALITY" = "best" ]; then
            echo "No height check needed (audio or best)."
            echo "use_exact=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          PROXY="--proxy socks5://127.0.0.1:1080"
          POT_ARG="--extractor-args youtube:pot-provider=http://127.0.0.1:4416"
          CLIENTS=(
            "--extractor-args youtube:player_client=web --js-runtimes deno --user-agent 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36' --add-header Accept-Language:en-US,en;q=0.9"
            "--extractor-args youtube:player_client=mweb"
            "--extractor-args youtube:player_client=android --user-agent 'Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36'"
            "--extractor-args youtube:player_client=ios --user-agent 'Mozilla/5.0 (iPhone; CPU iPhone OS 17_5 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.5 Mobile/15E148 Safari/604.1'"
          )

          FORMAT_LIST=""
          for client_args in "${CLIENTS[@]}"; do
            echo "🔍 Trying with client: ${client_args%% *}..."
            TEMP_OUT=$(yt-dlp ${PROXY} ${POT_ARG} ${client_args} ${COOKIES_FILE} \
              --no-playlist --no-check-certificates \
              --print "%(height)s" "$URL" 2>/tmp/yt_probe_err.log || true)
            if [ -n "$TEMP_OUT" ]; then
              FORMAT_LIST=$(echo "$TEMP_OUT" | sort -n | uniq | grep -v '^$')
              echo "✅ Client succeeded, heights: $FORMAT_LIST"
              break
            else
              echo "⚠️ No heights from this client. Error log:"
              cat /tmp/yt_probe_err.log
            fi
          done

          if [ -z "$FORMAT_LIST" ]; then
            echo "::warning::Could not retrieve any format list from any client. The video may require login, cookies, or a PO Token. Proceeding as if exact quality might exist."
            echo "use_exact=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if echo "$FORMAT_LIST" | grep -qx "$QUALITY"; then
            echo "✅ Quality ${QUALITY}p is available!"
            echo "use_exact=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Quality ${QUALITY}p NOT found. Available heights: $FORMAT_LIST"
            echo "use_exact=false" >> $GITHUB_OUTPUT
            if grep -qi "SABR" /tmp/yt_probe_err.log 2>/dev/null; then
              echo "::warning::SABR might be limiting formats."
            elif grep -qi "sign in to confirm your age" /tmp/yt_probe_err.log 2>/dev/null; then
              echo "::warning::Video is age-restricted. Cookies may be required."
            else
              echo "::warning::Exact height unavailable (geo/age/client restriction)."
            fi
          fi

      - name: Download YouTube video/audio
        id: download
        run: |
          set -uo pipefail

          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          AUDIO_ONLY="${{ github.event.inputs.audio_only }}"
          COMPRESSION="${{ github.event.inputs.compression_level }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          USE_COOKIES="${{ github.event.inputs.use_cookies }}"
          YOUTUBE_COOKIES_SECRET="${{ secrets.YOUTUBE_COOKIES }}"
          STRICT="${{ github.event.inputs.strict_quality }}"
          USE_EXACT="${{ steps.quality_check.outputs.use_exact }}"
          SPLIT_SIZE_INPUT="${{ github.event.inputs.split_size }}"
          USE_PUBLIC_PROXY="${{ steps.public_proxy.outputs.proxy_available }}"
          PUBLIC_PROXY="${{ steps.public_proxy.outputs.proxy_address }}"

          # ⭐ خروجی‌های مرحله API
          API_SUCCESS="${{ steps.api_download.outputs.api_success }}"
          API_FILE="${{ steps.api_download.outputs.api_file }}"

          if ! [[ "$SPLIT_SIZE_INPUT" =~ ^[0-9]+$ ]] || [ "$SPLIT_SIZE_INPUT" -le 0 ]; then
            echo "Invalid split size, using default 90"
            SPLIT_SIZE_INPUT=90
          fi
          SPLIT_BYTES=$(( SPLIT_SIZE_INPUT * 1024 * 1024 ))

          [ "$COMPRESSION" -lt 0 ] && COMPRESSION=0
          [ "$COMPRESSION" -gt 9 ] && COMPRESSION=9

          BACKUP_DIR="/tmp/video_backup_$$"
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt
          mkdir -p videos tmp_downloads

          YT_LOG="/tmp/ytdlp.log"
          > "$YT_LOG"

          if [ "$USE_COOKIES" = "true" ] && [ -n "$YOUTUBE_COOKIES_SECRET" ]; then
            echo "Writing cookies.txt..."
            echo "$YOUTUBE_COOKIES_SECRET" > ./cookies.txt
            COOKIES_FLAG="--cookies ./cookies.txt"
            COOKIES_STATUS="YES"
          else
            COOKIES_FLAG=""
            COOKIES_STATUS="NO"
            [ "$USE_COOKIES" = "true" ] && echo "WARNING: use_cookies is ON but secret is empty."
          fi

          # ⭐ اگر API فایل را با موفقیت دانلود کرده باشد، مستقیم استفاده کن
          if [ "$API_SUCCESS" = "true" ] && [ -f "$API_FILE" ]; then
            echo "✅ Using file from API: $API_FILE"
            cp "$API_FILE" "tmp_downloads/$(basename "$API_FILE")"
            DOWNLOAD_TYPE="video"
            QUALITY_MISMATCH=false
            ACTUAL_QUALITY_DESC=""
            MISMATCH_REASON=""
            BEST_HEIGHT=$QUALITY
            # کیفیت را دقیقاً برابر درخواستی در نظر بگیر
            echo "API download was successful, skipping yt-dlp methods."
          else
            # ⭐⭐⭐ بلوک اصلی yt‑dlp (بدون تغییر) ⭐⭐⭐
            echo "Downloading: $URL (Audio=$AUDIO_ONLY, Quality=$QUALITY, Cookies=$COOKIES_STATUS, Strict=$STRICT, Split size=${SPLIT_SIZE_INPUT}MB)"

            sanitize_name() { echo "$1" | sed 's/ /-/g; s/　/-/g' | tr -s '-'; }
            urlencode() { python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"; }

            if [ "$AUDIO_ONLY" = "true" ]; then
              DOWNLOAD_TYPE="audio"
            else
              DOWNLOAD_TYPE="video"
            fi

            # ساخت رشته فرمت (بدون تغییر)
            if [ "$AUDIO_ONLY" = "true" ]; then
              FORMAT="bestaudio/best"
            else
              if [ "$USE_EXACT" = "true" ] && [ "$QUALITY" != "best" ]; then
                case "$QUALITY" in
                  144)  FORMAT="bestvideo[height=144]+bestaudio/best[height=144]" ;;
                  240)  FORMAT="bestvideo[height=240]+bestaudio/best[height=240]" ;;
                  360)  FORMAT="bestvideo[height=360]+bestaudio/best[height=360]" ;;
                  480)  FORMAT="bestvideo[height=480]+bestaudio/best[height=480]" ;;
                  720)  FORMAT="bestvideo[height=720]+bestaudio/best[height=720]" ;;
                  1080) FORMAT="bestvideo[height=1080]+bestaudio/best[height=1080]" ;;
                  1440) FORMAT="bestvideo[height=1440]+bestaudio/best[height=1440]" ;;
                  2160) FORMAT="bestvideo[height=2160]+bestaudio/best[height=2160]" ;;
                  *)    echo "Unknown quality"; exit 1 ;;
                esac
              else
                if [ "$STRICT" = "true" ] && [ "$USE_EXACT" = "false" ]; then
                  echo "🚫 Strict mode: quality ${QUALITY}p not available. Aborting."
                  exit 1
                fi
                case "$QUALITY" in
                  144)  FORMAT="bestvideo[height<=144]+bestaudio/best[height<=144]/best" ;;
                  240)  FORMAT="bestvideo[height<=240]+bestaudio/best[height<=240]/best" ;;
                  360)  FORMAT="bestvideo[height<=360]+bestaudio/best[height<=360]/best" ;;
                  480)  FORMAT="bestvideo[height<=480]+bestaudio/best[height<=480]/best" ;;
                  720)  FORMAT="bestvideo[height<=720]+bestaudio/best[height<=720]/best" ;;
                  1080) FORMAT="bestvideo[height<=1080]+bestaudio/best[height<=1080]/best" ;;
                  1440) FORMAT="bestvideo[height<=1440]+bestaudio/best[height<=1440]/best" ;;
                  2160) FORMAT="bestvideo[height<=2160]+bestaudio/best[height<=2160]/best" ;;
                  best)  FORMAT="bestvideo+bestaudio/best" ;;
                  *)     echo "Unknown quality"; exit 1 ;;
                esac
              fi
            fi

            COMMON_FLAGS=(--output "tmp_downloads/%(title)s.%(ext)s" --no-part --no-playlist --retries 10 --fragment-retries 10 --no-check-certificates)

            get_method_args() {
              local meth="$1"
              args=()
              local POT_ARG="--extractor-args"
              local POT_VALUE="youtube:pot-provider=http://127.0.0.1:4416"
              case "$meth" in
                1)  args+=("--proxy" "socks5://127.0.0.1:1080" "--extractor-args" "youtube:player_client=web" "--js-runtimes" "deno" "--user-agent" "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" "--add-header" "Accept-Language:en-US,en;q=0.9") ;;
                2)  args+=("--proxy" "socks5://127.0.0.1:1080" "--extractor-args" "youtube:player_client=mweb" "--concurrent-fragments" "4") ;;
                3)  args+=("--extractor-args" "youtube:player_client=web" "--js-runtimes" "deno" "--user-agent" "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" "--add-header" "Accept-Language:en-US,en;q=0.9") ;;
                4)  args+=("--extractor-args" "youtube:player_client=mweb" "--concurrent-fragments" "4") ;;
                5)  args+=("--proxy" "socks5://127.0.0.1:1080" "--extractor-args" "youtube:player_client=web,mweb" "--js-runtimes" "deno" "--user-agent" "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" "--add-header" "Accept-Language:en-US,en;q=0.9" "--concurrent-fragments" "4") ;;
                6)  args+=("--extractor-args" "youtube:player_client=android" "--user-agent" "Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36" "--concurrent-fragments" "4") ;;
                7)  args+=("--proxy" "socks5://127.0.0.1:1080" "--extractor-args" "youtube:player_client=android" "--user-agent" "Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36" "--concurrent-fragments" "4") ;;
                8)  args+=("--extractor-args" "youtube:player_client=web,mweb" "--js-runtimes" "deno" "--user-agent" "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" "--add-header" "Accept-Language:en-US,en;q=0.9" "--concurrent-fragments" "4") ;;
                9)  args+=("--proxy" "socks5://127.0.0.1:1080" "--extractor-args" "youtube:player_client=ios" "--user-agent" "Mozilla/5.0 (iPhone; CPU iPhone OS 17_5 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/17.5 Mobile/15E148 Safari/604.1" "--concurrent-fragments" "4") ;;
                10) args+=("--extractor-args" "youtube:player_client=ios" "--concurrent-fragments" "4") ;;
                *)   echo "Unknown method $meth"; exit 1 ;;
              esac
              args+=("$POT_ARG" "$POT_VALUE")
            }

            DOWNLOAD_SUCCESS=false
            TOTAL_METHODS=10
            BEST_HEIGHT=0

            for (( meth=1; meth<=TOTAL_METHODS; meth++ )); do
              echo "Trying method $meth/$TOTAL_METHODS..."
              get_method_args $meth
              set +e
              yt-dlp --format "$FORMAT" "${COMMON_FLAGS[@]}" ${COOKIES_FLAG} "${args[@]}" "$URL" 2>&1 | tee -a "$YT_LOG"
              YT_EXIT=${PIPESTATUS[0]}
              set -e

              if [ $YT_EXIT -eq 0 ] || [ -n "$(find tmp_downloads -type f ! -name '*.part' -size +0 2>/dev/null)" ]; then
                DOWNLOAD_SUCCESS=true
                echo "Success with method $meth (exit=$YT_EXIT)"
                if [ "$AUDIO_ONLY" != "true" ] && [ "$QUALITY" != "best" ]; then
                  VIDEO_FILE=$(find tmp_downloads -type f ! -name "*.part" -size +0 2>/dev/null | head -1)
                  if [ -n "$VIDEO_FILE" ]; then
                    HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of csv=p=0 "$VIDEO_FILE" 2>/dev/null | head -1)
                    if [ -n "$HEIGHT" ] && [ "$HEIGHT" -ge 0 ] 2>/dev/null; then
                      BEST_HEIGHT=$HEIGHT
                      if [ "$HEIGHT" -ge "$QUALITY" ]; then
                        echo "✅ Achieved ${HEIGHT}p (desired ${QUALITY}p). Stopping."
                        break
                      else
                        echo "⚠️ Got ${HEIGHT}p, need ${QUALITY}p. Trying next method..."
                        rm -rf tmp_downloads/*
                        DOWNLOAD_SUCCESS=false
                      fi
                    fi
                  fi
                else
                  break
                fi
              else
                echo "Method $meth failed, waiting..."
                sleep $((RANDOM % 10 + 5))
                find tmp_downloads -name "*.part" -delete 2>/dev/null || true
              fi
            done

            if ! $DOWNLOAD_SUCCESS; then
              if [ -z "$(find tmp_downloads -type f ! -name '*.part' -size +0 2>/dev/null)" ]; then
                echo "No file yet, trying final fallback with web,mweb..."
                set +e
                yt-dlp --format "$FORMAT" "${COMMON_FLAGS[@]}" ${COOKIES_FLAG} \
                  --extractor-args "youtube:player_client=web,mweb;pot-provider=http://127.0.0.1:4416" \
                  --js-runtimes deno \
                  --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
                  --add-header "Accept-Language:en-US,en;q=0.9" \
                  --concurrent-fragments 4 \
                  "$URL" 2>&1 | tee -a "$YT_LOG"
                YT_EXIT=${PIPESTATUS[0]}
                set -e
                if [ $YT_EXIT -eq 0 ] || [ -n "$(find tmp_downloads -type f ! -name '*.part' -size +0 2>/dev/null)" ]; then
                  DOWNLOAD_SUCCESS=true
                  echo "Fallback succeeded."
                fi
              else
                DOWNLOAD_SUCCESS=true
                echo "Accepting previously downloaded lower quality file."
              fi
            fi

            # آخرین راه حل: پروکسی عمومی
            if ! $DOWNLOAD_SUCCESS && [ "$USE_PUBLIC_PROXY" = "true" ] && [ -n "$PUBLIC_PROXY" ]; then
              echo "⚠️ WARP methods exhausted. Trying public proxy $PUBLIC_PROXY ..."
              set +e
              yt-dlp --format "$FORMAT" "${COMMON_FLAGS[@]}" ${COOKIES_FLAG} \
                --proxy "socks5://$PUBLIC_PROXY" \
                --extractor-args "youtube:player_client=web,mweb;pot-provider=http://127.0.0.1:4416" \
                --js-runtimes deno \
                --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36" \
                --add-header "Accept-Language:en-US,en;q=0.9" \
                --concurrent-fragments 4 \
                "$URL" 2>&1 | tee -a "$YT_LOG"
              YT_EXIT=${PIPESTATUS[0]}
              set -e
              if [ $YT_EXIT -eq 0 ] || [ -n "$(find tmp_downloads -type f ! -name '*.part' -size +0 2>/dev/null)" ]; then
                DOWNLOAD_SUCCESS=true
                echo "✅ Public proxy download succeeded!"
              else
                echo "❌ Public proxy also failed."
              fi
            fi

            if ! $DOWNLOAD_SUCCESS; then
              echo "All methods failed!"
              exit 1
            fi

            # تعیین دلیل عدم تطابق کیفیت (برای yt‑dlp)
            MISMATCH_REASON=""
            if grep -qi "SABR-only\|missing a URL\|SABR" "$YT_LOG"; then
              MISMATCH_REASON="YouTube SABR experiment limited available formats."
            elif grep -qi "sign in to confirm your age\|age.restricted\|age restricted" "$YT_LOG"; then
              MISMATCH_REASON="Video is age-restricted; login required for full quality."
            elif grep -qi "HTTP Error 403\|Forbidden" "$YT_LOG"; then
              MISMATCH_REASON="Access denied (403 Forbidden); possibly geo-restricted or bot detection."
            elif grep -qi "This video is private\|Video unavailable" "$YT_LOG"; then
              MISMATCH_REASON="Video may be private or unavailable in your region."
            else
              MISMATCH_REASON="YouTube served a lower quality format (possible A/B testing or regional restrictions)."
            fi

            QUALITY_MISMATCH=false
            ACTUAL_QUALITY_DESC=""
            if [ "$AUDIO_ONLY" != "true" ] && [ "$QUALITY" != "best" ]; then
              VIDEO_FILE=$(find tmp_downloads -type f ! -name "*.part" -size +0 2>/dev/null | head -1)
              if [ -n "$VIDEO_FILE" ]; then
                HEIGHT=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of csv=p=0 "$VIDEO_FILE" 2>/dev/null | head -1)
                if [ -n "$HEIGHT" ] && [ "$HEIGHT" -ge 0 ] 2>/dev/null; then
                  if [ "$HEIGHT" -lt "$QUALITY" ]; then
                    QUALITY_MISMATCH=true
                    ACTUAL_QUALITY_DESC="${HEIGHT}p"
                    echo "⚠️ Quality mismatch: Requested ${QUALITY}p but got ${HEIGHT}p"
                    echo "Reason: $MISMATCH_REASON"
                  else
                    ACTUAL_QUALITY_DESC="${HEIGHT}p"
                    echo "✅ Quality OK: ${HEIGHT}p"
                  fi
                fi
              fi
            fi
            # پایان بلوک yt‑dlp
          fi

          # ⭐ پاکسازی فایل‌های ناقص
          find tmp_downloads -name "*.part" -delete

          # ⭐ اعتبارسنجی فایل‌های دانلود شده (مشترک)
          echo "::group::Validating downloaded file(s)"
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            if ffprobe -v error "$FILE" >/dev/null 2>&1; then
              echo "✅ Valid: $FILE"
            else
              echo "❌ Corrupt file detected: $FILE. Aborting."
              exit 1
            fi
          done
          echo "::endgroup::"

          echo "Download complete:"
          ls -la tmp_downloads/

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          generate_random_numeric_name() {
            local PART1=$(( RANDOM * 32768 + RANDOM ))
            local PART2=$(( RANDOM * 32768 + RANDOM ))
            echo "${PART1}${PART2}"
          }
          get_unique_numeric_folder() {
            local CANDIDATE
            while true; do
              CANDIDATE=$(generate_random_numeric_name)
              [ ! -d "videos/$CANDIDATE" ] && [ ! -d "$BACKUP_DIR/$CANDIDATE" ] && echo "$CANDIDATE" && return
            done
          }

          > /tmp/video_info.txt

          # ⭐ ساخت آرشیو و README (مشترک برای هر دو روش)
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue

            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")
            FILENAME_NO_EXT="${BASENAME%.*}"
            EXT="${BASENAME##*.}"
            # sanitize_name باید تعریف شده باشد (در بلوک yt‑dlp تعریف شده، در API هم نیاز داریم)
            sanitize_name() { echo "$1" | sed 's/ /-/g; s/　/-/g' | tr -s '-'; }
            FILENAME_NO_EXT=$(sanitize_name "$FILENAME_NO_EXT")
            echo "Processing: $BASENAME ($(( SIZE / 1024 / 1024 ))MB)"

            FINAL_FOLDER_NAME=$(get_unique_numeric_folder)
            mkdir -p "$BACKUP_DIR/${FINAL_FOLDER_NAME}"
            echo "${FILENAME_NO_EXT}|${FINAL_FOLDER_NAME}" >> /tmp/video_info.txt
            FOLDER_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}")
            COMPRESS_FLAG="-mx=${COMPRESSION}"

            if [ "$AUDIO_ONLY" = "true" ]; then
              MEDIA_INFO_LINE="| **Type** | **Audio only (best quality)** |"
              QUALITY_WARNING_LINE=""
            else
              MEDIA_INFO_LINE="| **Quality** | **${QUALITY}** |"
              if [ "$QUALITY_MISMATCH" = true ]; then
                QUALITY_WARNING_LINE="| **⚠️ Quality Warning** | **Requested ${QUALITY}p, got ${ACTUAL_QUALITY_DESC}** |\n| **ℹ️ Possible Reason** | ${MISMATCH_REASON} |"
              else
                QUALITY_WARNING_LINE=""
              fi
            fi

            if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
              echo "Splitting $BASENAME into ${SPLIT_SIZE_INPUT}MB parts..."
              ARCHIVE_BASE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}"
              [ -n "$ZIP_PASSWORD" ] && PASS_ARG="-p${ZIP_PASSWORD} -mhe=on" || PASS_ARG=""
              7z a -v${SPLIT_SIZE_INPUT}m $PASS_ARG ${COMPRESS_FLAG} "${ARCHIVE_BASE}.7z" "$FILE"

              PART_COUNT=$(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.7z* 2>/dev/null | wc -l)
              TOTAL_SIZE=0
              for p in "$BACKUP_DIR/${FINAL_FOLDER_NAME}"/*; do [ -f "$p" ] && TOTAL_SIZE=$((TOTAL_SIZE+$(stat -c%s "$p"))); done
              TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE/1048576" | bc)

              LINKS=""
              NUM=0
              for part in $(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.7z* | sort); do
                NUM=$((NUM+1))
                bname=$(basename "$part")
                enc=$(urlencode "$bname")
                LINKS+="| $NUM | \`$bname\` | [Download](https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/videos/${FOLDER_ENCODED}/${enc}) |\n"
              done

              printf '%s\n' \
                "# ${FILENAME_NO_EXT}" \
                "" \
                "## ${DOWNLOAD_TYPE^} Information" \
                "" \
                "| Property | Value |" \
                "|----------|-------|" \
                "| **Name** | \`${FILENAME_NO_EXT}\` |" \
                "| **Original Link** | [YouTube ${DOWNLOAD_TYPE^}](${URL}) |" \
                "| **Total Size** | **${PART_COUNT} parts** - **${TOTAL_SIZE_MB} MB** |" \
                "${MEDIA_INFO_LINE}" \
                "${QUALITY_WARNING_LINE}" \
                "| **Compression** | **level ${COMPRESSION}** |" \
                "| **Password Protected** | **$( [ -n "$ZIP_PASSWORD" ] && echo YES || echo NO )** |" \
                "" \
                "## Download Links" \
                "" \
                "| # | File | Link |" \
                "|---|------|------|" \
                "${LINKS}" \
                "" \
                "## How to Extract" \
                "1. Download all parts" \
                "2. Install 7-Zip or Keka" \
                "3. Right-click .7z.001 -> Extract Here" \
                "4. All parts combine automatically" \
                $( [ -n "$ZIP_PASSWORD" ] && echo "5. Enter the password when prompted" ) \
                > "$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
            else
              [ -n "$ZIP_PASSWORD" ] && { 7z a -p"${ZIP_PASSWORD}" -mhe=on ${COMPRESS_FLAG} "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.7z" "$FILE"; ARCHIVE_EXT="7z"; } || { cp "$FILE" "$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}.${EXT}"; ARCHIVE_EXT="${EXT}"; }
              SIZE_MB=$(echo "scale=2; $SIZE/1048576" | bc)
              FILE_ENC=$(urlencode "${FINAL_FOLDER_NAME}.${ARCHIVE_EXT}")
              RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/videos/${FOLDER_ENCODED}/${FILE_ENC}"

              if [ "$ARCHIVE_EXT" = "7z" ]; then
                EXTRACT_GUIDE_LINE1="1. Install 7-Zip/Keka"
                EXTRACT_GUIDE_LINE2="2. Right-click .7z -> Extract Here"
                EXTRACT_GUIDE_LINE3="$([ -n "$ZIP_PASSWORD" ] && echo '3. Enter password when prompted')"
              else
                EXTRACT_GUIDE_LINE1="No extraction needed - play directly"
                EXTRACT_GUIDE_LINE2=""
                EXTRACT_GUIDE_LINE3=""
              fi

              printf '%s\n' \
                "# ${FILENAME_NO_EXT}" \
                "" \
                "## ${DOWNLOAD_TYPE^} Information" \
                "" \
                "| Property | Value |" \
                "|----------|-------|" \
                "| **Name** | \`${FILENAME_NO_EXT}\` |" \
                "| **Original Link** | [YouTube ${DOWNLOAD_TYPE^}](${URL}) |" \
                "| **Total Size** | **1 file** - **${SIZE_MB} MB** |" \
                "${MEDIA_INFO_LINE}" \
                "${QUALITY_WARNING_LINE}" \
                "| **Compression** | **level ${COMPRESSION}** |" \
                "| **Password Protected** | **$( [ -n "$ZIP_PASSWORD" ] && echo YES || echo NO )** |" \
                "" \
                "## Download Link" \
                "| # | File | Link |" \
                "|---|------|------|" \
                "| 1 | \`${FINAL_FOLDER_NAME}.${ARCHIVE_EXT}\` | [Download](${RAW_LINK}) |" \
                "" \
                "## How to Extract" \
                "${EXTRACT_GUIDE_LINE1}" \
                "${EXTRACT_GUIDE_LINE2}" \
                "${EXTRACT_GUIDE_LINE3}" \
                > "$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md"
            fi
          done

          rm -rf tmp_downloads
          echo "Backup dir contents:"; find "$BACKUP_DIR" -type f | head -50
          cat /tmp/video_info.txt

      - name: Stop PO Token Provider
        if: always()
        run: |
          docker stop bgutil-provider 2>/dev/null || true
          docker rm bgutil-provider 2>/dev/null || true

      - name: Stop Cloudflare WARP container
        if: always()
        run: |
          docker stop warp 2>/dev/null || true
          docker rm warp 2>/dev/null || true

      - name: Commit and push files
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          [ $(find "$BACKUP_DIR" -type f | wc -l) -eq 0 ] && { echo "No files to push"; exit 1; }

          urlencode() { python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"; }

          regenerate_master_readme() {
            : > videos/README.md
            local EM=("🎬" "🎥" "📽️" "🎞️" "📺" "🎦" "🎭" "🎪" "🎯" "🎮" "🎵" "🎶" "🎸" "🎹" "🎤")
            local num=0
            for d in videos/*/; do
              [ -d "$d" ] || continue
              local name=$(basename "$d")
              [ -f "$d/README.md" ] || continue
              num=$((num+1))
              local emoji="${EM[$((RANDOM % ${#EM[@]}))]}"
              local enc=$(urlencode "$name")
              printf "%s %s - [%s](https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/videos/${enc})\n" "$num" "$emoji" "$name" >> videos/README.md
            done
          }

          for i in {1..20}; do
            echo "Push attempt $i"
            git fetch origin "$BRANCH"
            git reset --hard origin/"$BRANCH"
            mkdir -p videos
            cp -r "$BACKUP_DIR"/* videos/ 2>/dev/null || true
            regenerate_master_readme
            git add -A videos/
            git diff --cached --quiet && { echo "No changes"; exit 0; }
            git commit -m "[YouTube] Add video [skip ci]"
            git push origin HEAD:"$BRANCH" && { echo "Push OK!"; exit 0; }
            sleep $((3 + RANDOM % 10))
          done
          echo "Push failed after 20 retries"
          exit 1