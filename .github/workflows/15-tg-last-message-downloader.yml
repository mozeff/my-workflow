name: 📥 Download Newest File from Telegram Channel

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Telegram channel (@username or link)'
        required: true
        type: string
      zip_option:
        description: 'Output type'
        required: true
        type: choice
        options:
          - zip
          - unzip
      password:
        description: 'Zip password (optional)'
        required: false
        default: ''
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          npm install puppeteer-core

      - name: Extract channel username
        id: channel_info
        run: |
          CH="${{ github.event.inputs.channel }}"
          CLEAN=$(echo "$CH" | sed -E 's|https?://t\.me/||i' | sed 's/^@//' | sed 's|/.*||')
          echo "slug=$CLEAN" >> $GITHUB_OUTPUT

      - name: Find newest file & get download URL
        id: file_url
        env:
          CHANNEL: ${{ steps.channel_info.outputs.slug }}
        run: |
          cat > get_url.js << 'EOF'
          const puppeteer = require('puppeteer-core');
          const fs = require('fs');

          (async () => {
            const browser = await puppeteer.launch({
              executablePath: '/usr/bin/chromium-browser',
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 800 });

            await page.goto(`https://t.me/s/${process.env.CHANNEL}`, {
              waitUntil: 'networkidle0',
              timeout: 60000
            });

            try {
              await page.waitForSelector('.tgme_widget_message_wrap', { timeout: 10000 });
            } catch {
              console.error('No messages found');
              await browser.close();
              process.exit(1);
            }

            // گرفتن اولین (جدیدترین) پیام دارای فایل
            const downloadUrl = await page.evaluate(() => {
              const msgWraps = Array.from(document.querySelectorAll('.tgme_widget_message_wrap'));
              const firstDocWrap = msgWraps.find(el =>
                el.querySelector('.tgme_widget_message_document_wrap')
              );
              if (!firstDocWrap) return null;

              const dataPost = firstDocWrap.getAttribute('data-post');
              if (!dataPost) return null;
              const parts = dataPost.split('/');
              if (parts.length < 2) return null;
              const msgId = parts[1];
              return `https://t.me/${process.env.CHANNEL}/${msgId}?download=1`;
            });

            if (!downloadUrl) {
              console.error('No file attachment found in any message');
              await browser.close();
              process.exit(1);
            }

            fs.writeFileSync('download_url.txt', downloadUrl);
            await browser.close();
          })();
          EOF
          node get_url.js
          echo "url=$(cat download_url.txt)" >> $GITHUB_OUTPUT

      - name: Download file
        run: |
          URL="${{ steps.file_url.outputs.url }}"
          echo "Downloading $URL"
          curl -L -O -J "$URL"
          ls -la

      - name: Prepare output
        id: prepare
        run: |
          ZIP_OPTION="${{ github.event.inputs.zip_option }}"
          PASS="${{ github.event.inputs.password }}"
          SLUG="${{ steps.channel_info.outputs.slug }}"
          TS=$(date +%Y%m%d_%H%M%S)
          DIR="downloaded_files/${SLUG}_${TS}"
          mkdir -p "$DIR"

          DOWNLOADED_FILE=$(ls -t | head -1)
          if [ "$ZIP_OPTION" = "zip" ]; then
            if [ -n "$PASS" ]; then
              7z a -p"${PASS}" -mhe=on "${DIR}/file.7z" "$DOWNLOADED_FILE"
            else
              7z a "${DIR}/file.7z" "$DOWNLOADED_FILE"
            fi
            echo "output_file=file.7z" >> $GITHUB_OUTPUT
          else
            mv "$DOWNLOADED_FILE" "$DIR/"
            echo "output_file=$DOWNLOADED_FILE" >> $GITHUB_OUTPUT
          fi
          echo "dir=$DIR" >> $GITHUB_OUTPUT

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A downloaded_files/
          git commit -m "Downloaded newest file from ${{ steps.channel_info.outputs.slug }} [skip ci]" || true

          BRANCH="${GITHUB_REF_NAME}"
          for i in 1 2 3 4 5; do
            if timeout 120 git push origin HEAD:"$BRANCH"; then
              echo "Push successful"
              exit 0
            fi
            sleep $((2 + RANDOM % 5))
            git fetch origin "$BRANCH" --quiet
            git reset --hard origin/"$BRANCH"
            git add -A downloaded_files/
            git commit -m "Downloaded newest file [skip ci]" || true
          done
          echo "Push failed"
          exit 1