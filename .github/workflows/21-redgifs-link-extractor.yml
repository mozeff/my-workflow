name: 🎬 test-Link Extractor (User + Tag Search)

on:
  workflow_dispatch:
    inputs:
      tag_or_url:
        description: 'URL OR tag name (e.g., dance, happy, https://www.***.com/user/abc)'
        required: true
        type: string
      num_links:
        description: 'Number of video links to extract'
        required: true
        default: 10
        type: number

jobs:
  extract-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install yt-dlp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip
          pip3 install --upgrade yt-dlp

      - name: Extract links from *** (user or tag)
        run: |
          INPUT="${{ github.event.inputs.tag_or_url }}"
          NUM_LINKS="${{ github.event.inputs.num_links }}"

          # تشخیص آدرس کامل یا تگ
          if [[ "$INPUT" =~ ^https?:// ]]; then
            TARGET_URL="$INPUT"
          else
            # حذف فاصله‌های احتمالی و جایگزینی با خط تیره
            TAG=$(echo "$INPUT" | tr ' ' '-' | tr '[:upper:]' '[:lower:]')
            TARGET_URL="https://www.***.com/gifs/tag/${TAG}"
          fi

          echo "Target URL: ${TARGET_URL}"
          echo "Extracting up to ${NUM_LINKS} links..."

          # فایل موقت برای شمارش لینک‌های معتبر
          TMP_LINKS="/tmp/tmp_links.txt"
          > "$TMP_LINKS"

          while IFS='|' read -r USERNAME TITLE URL; do
            if [ -n "$TITLE" ] && [ -n "$URL" ]; then
              echo "$URL" >> "$TMP_LINKS"
            fi
          done < <(yt-dlp --flat-playlist --playlist-end "$NUM_LINKS" \
                     --print "%(uploader)s|%(title)s|%(webpage_url)s" \
                     "$TARGET_URL" 2>/dev/null || echo "Failed to extract.")

          TOTAL=$(wc -l < "$TMP_LINKS")
          echo "Successfully extracted $TOTAL links."

          # ایجاد README فقط با تعداد (حجم) استخراج‌شده، بدون هیچ جزئیاتی
          LINKS_FILE="/tmp/extracted_links.md"
          {
            echo "# Extracted Links Summary"
            echo ""
            echo "Total links extracted: **${TOTAL}**"
            echo ""
            echo "*Generated by GitHub Actions*"
          } > "$LINKS_FILE"

          cat "$LINKS_FILE"

          mkdir -p lists
          cp "$LINKS_FILE" lists/extracted_links.md

      - name: Commit and push list to repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          BRANCH="${GITHUB_REF_NAME}"

          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"

          mkdir -p lists
          cp /tmp/extracted_links.md lists/extracted_links.md

          git add lists/extracted_links.md

          if git diff --cached --quiet; then
            echo "No changes to push."
            exit 0
          fi

          git commit -m "[Link Extraction] Updated list [skip ci]"

          RETRY_MAX=10
          for ((i=1; i<=RETRY_MAX; i++)); do
            echo "Push attempt $i/$RETRY_MAX"
            if git push origin HEAD:"$BRANCH" 2>&1; then
              echo "Push successful!"
              exit 0
            else
              WAIT=$((2 + RANDOM % 8))
              echo "Push failed, retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done

          echo "All push attempts failed."
          exit 1