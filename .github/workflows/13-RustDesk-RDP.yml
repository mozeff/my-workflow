name: 🦀 دسکتاپ با RustDesk

on:
  workflow_dispatch:

jobs:
  rustdesk:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: نصب دسکتاپ و RustDesk
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xfce4 xfce4-goodies
          # دانلود آخرین نسخه RustDesk Server
          wget -q https://github.com/rustdesk/rustdesk-server/releases/latest/download/rustdesk-server-linux-amd64.deb
          sudo dpkg -i rustdesk-server-linux-amd64.deb
          # تولید رمز تصادفی
          PASS=$(openssl rand -base64 12)
          echo "RUSTDESK_PASSWORD=$PASS" >> $GITHUB_ENV
          sudo rustdesk-server --password "$PASS"

      - name: نمایش ID و رمز
        run: |
          echo "🔹 RustDesk ID:"
          # ID از خروجی دستور بعدی
          sudo rustdesk-server --id
          echo "🔐 رمز عبور: $RUSTDESK_PASSWORD"
          # زنده نگه داشتن جلسه
          while true; do sleep 3600; done