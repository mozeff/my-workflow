name: 🦀 دسکتاپ با RustDesk

on:
  workflow_dispatch:

jobs:
  rustdesk:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: نصب محیط دسکتاپ و ابزارهای لازم
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xfce4 xfce4-goodies xvfb x11vnc jq curl wget

      # در صورت نیاز به SSH دستی روی رانر، کامنت این بخش را بردارید
      # - name: تونل SSH اضطراری (tmate) - فقط برای دیباگ
      #   uses: mxschmitt/action-tmate@v3
      #   timeout-minutes: 15  # پس از ۱۵ دقیقه خودکار بسته می‌شود

      - name: دانلود و نصب مقاوم کلاینت RustDesk
        run: |
          echo "🔍 دریافت آخرین نسخه RustDesk"

          # دریافت اطلاعات آخرین ریلیز
          RELEASE_JSON=$(curl -s https://api.github.com/repos/rustdesk/rustdesk/releases/latest)

          # تلاش برای یافتن فایل deb مناسب از assets
          DEB_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("rustdesk-.*-x86_64\\.deb$")) | .browser_download_url' | head -1)

          # اگر از assets پیدا نشد، با تگ نسخه لینک بساز
          if [ -z "$DEB_URL" ]; then
            TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
            VERSION="${TAG#v}"
            DEB_URL="https://github.com/rustdesk/rustdesk/releases/download/${TAG}/rustdesk-${VERSION}-x86_64.deb"
          fi

          echo "📥 دانلود از: $DEB_URL"
          wget -q "$DEB_URL" -O rustdesk.deb || { echo "❌ دانلود ناموفق"; exit 1; }

          echo "📦 نصب با apt (مدیریت خودکار وابستگی‌ها)"
          sudo apt install -y ./rustdesk.deb
          echo "✅ نصب کامل شد"

      - name: راه‌اندازی نمایشگر مجازی و کلاینت RustDesk
        run: |
          # ساخت رمز عبور تصادفی
          PASS=$(openssl rand -base64 12)
          echo "RUSTDESK_PASSWORD=$PASS" >> $GITHUB_ENV

          # صفحه‌نمایش مجازی
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x16 &
          sleep 2

          # محیط دسکتاپ
          startxfce4 &
          sleep 5

          # کلاینت RustDesk با رمز دائمی
          rustdesk --password "$PASS" &
          sleep 3

          # نمایش مشخصات اتصال
          echo "🔹 RustDesk ID:"
          rustdesk --get-id
          echo "🔐 رمز عبور: $PASS"
          echo "⏳ جلسه تا ۶ ساعت فعال است. با ID و رمز بالا از راه دور وصل شوید."

          # زنده نگه‌داشتن رانر
          while true; do sleep 3600; done