name: 🖥️ Remote Desktop via Cloudflare (Secret Password)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: نصب دسکتاپ و RDP
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xfce4 xfce4-goodies xrdp
          sudo systemctl enable xrdp
          # رمز از Secret خوانده می‌شود
          echo "runneradmin:${{ secrets.RDP_PASSWORD }}" | sudo chpasswd
          sudo usermod -aG ssl-cert xrdp
          sudo systemctl restart xrdp

      - name: دانلود cloudflared
        run: |
          curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: راه‌اندازی تونل Cloudflare
        run: |
          cloudflared tunnel --url rdp://localhost:3389 --no-autoupdate > cloudflare.log 2>&1 &
          for i in {1..30}; do
            if grep -q "https://.*\.trycloudflare\.com" cloudflare.log; then
              break
            fi
            sleep 2
          done
          echo "🔗 آدرس اتصال:"
          grep -o "https://[a-zA-Z0-9.-]*\.trycloudflare\.com" cloudflare.log || echo "تونل هنوز آماده نیست"
          sleep infinity &
          wait

      - name: اطلاعات بیشتر
        if: always()
        run: |
          echo "👤 نام کاربری: runneradmin"
          echo "🔑 رمز عبور: در Secrets مخزن ذخیره شده (RDP_PASSWORD)"