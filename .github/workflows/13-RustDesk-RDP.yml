name: 🦀 دسکتاپ با RustDesk

on:
  workflow_dispatch:

jobs:
  rustdesk:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: نصب محیط دسکتاپ و ابزارهای لازم
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq xfce4 xfce4-goodies xvfb x11vnc  # x11vnc اختیاری

      - name: دانلود و نصب کلاینت RustDesk
        run: |
          wget -q https://github.com/rustdesk/rustdesk/releases/latest/download/rustdesk-x86_64.deb
          sudo dpkg -i rustdesk-x86_64.deb
          sudo apt-get install -f -y   # رفع وابستگی‌های احتمالی

      - name: راه‌اندازی نمایشگر مجازی و کلاینت RustDesk
        run: |
          # ساخت رمز تصادفی
          PASS=$(openssl rand -base64 12)
          echo "RUSTDESK_PASSWORD=$PASS" >> $GITHUB_ENV

          # راه‌اندازی Xvfb روی دیسپلی :99
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x16 &
          sleep 2

          # اجرای محیط دسکتاپ xfce4 در پس‌زمینه
          startxfce4 &
          sleep 5

          # اجرای کلاینت RustDesk بدون نیاز به GUI (حالت silent)
          # تنظیم رمز عبور دائمی
          rustdesk --password "$PASS" &
          sleep 3

          # نمایش ID کلاینت
          echo "🔹 RustDesk ID:"
          rustdesk --get-id
          echo "🔐 رمز عبور: $PASS"

          # زنده نگه داشتن session
          while true; do sleep 3600; done