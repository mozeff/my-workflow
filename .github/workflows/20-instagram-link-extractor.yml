name: 🎬 extra-Social Media Link Extractor

on:
  workflow_dispatch:
    inputs:
      profile_url:
        description: 'Instagram profile URL (e.g., https://www.instagram.com/username/)'
        required: true
        type: string
      num_links:
        description: 'Number of post links to extract'
        required: true
        default: 10
        type: number

jobs:
  extract-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install yt-dlp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip
          pip3 install --upgrade yt-dlp

      - name: Extract post links from Instagram profile
        run: |
          PROFILE_URL="${{ github.event.inputs.profile_url }}"
          NUM_LINKS="${{ github.event.inputs.num_links }}"

          echo "Extracting up to ${NUM_LINKS} post links from: ${PROFILE_URL}"

          LINKS_FILE="/tmp/instagram_links.md"
          {
            echo "# Instagram Posts from ${PROFILE_URL}"
            echo ""
            echo "Total requested: ${NUM_LINKS}"
            echo ""
            echo "| # | Username | Caption | Link | Type |"
            echo "|---|----------|---------|------|------|"
          } > "$LINKS_FILE"

          INDEX=1
          while IFS='|' read -r USERNAME CAPTION URL EXT; do
            if [ -n "$CAPTION" ] && [ -n "$URL" ]; then
              # Determine media type from extension
              if [[ "$EXT" == "mp4" ]]; then
                TYPE="🎥 Video"
              else
                TYPE="🖼️ Image"
              fi
              printf "| %d | %s | %s | [Open](%s) | %s |\n" "$INDEX" "$USERNAME" "$CAPTION" "$URL" "$TYPE" >> "$LINKS_FILE"
              INDEX=$((INDEX + 1))
            fi
          done < <(yt-dlp --flat-playlist --playlist-end "$NUM_LINKS" \
                     --print "%(uploader)s|%(title)s|%(webpage_url)s|%(ext)s" \
                     "$PROFILE_URL" 2>/dev/null || echo "Failed to extract.")

          echo "" >> "$LINKS_FILE"
          echo "*Generated by GitHub Actions*" >> "$LINKS_FILE"

          # Show the result in the logs
          cat "$LINKS_FILE"

          # Prepare output folder for commit
          mkdir -p lists
          cp "$LINKS_FILE" lists/instagram_links.md

      - name: Commit and push list to repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          BRANCH="${GITHUB_REF_NAME}"

          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"

          mkdir -p lists
          cp /tmp/instagram_links.md lists/instagram_links.md

          git add lists/instagram_links.md

          if git diff --cached --quiet; then
            echo "No changes to push."
            exit 0
          fi

          git commit -m "[Instagram Links] Extracted post links [skip ci]"

          RETRY_MAX=10
          for ((i=1; i<=RETRY_MAX; i++)); do
            echo "Push attempt $i/$RETRY_MAX"
            if git push origin HEAD:"$BRANCH" 2>&1; then
              echo "Push successful!"
              exit 0
            else
              WAIT=$((2 + RANDOM % 8))
              echo "Push failed, retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done

          echo "All push attempts failed."
          exit 1