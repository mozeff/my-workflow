name: ⬇️ 09-Multi download from URL

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of URLs to download'
        required: true
        type: string
      pack_method:
        description: 'Packaging method'
        required: true
        type: choice
        default: 'zip'
        options:
          - none
          - zip
          - split
      password:
        description: 'Password for zip files (optional)'
        required: false
        default: ''
        type: string
      compress_images:
        description: 'Compress downloaded images?'
        required: false
        type: boolean
        default: false
      image_quality:
        description: 'Image quality (if compression enabled)'
        required: false
        type: choice
        default: 'medium'
        options:
          - low
          - medium
          - high
      split_size:
        description: 'Max size per part (MB) - for split mode (default 45)'
        required: false
        default: '45'
        type: string
      take_screenshot:
        description: 'Take a full-page screenshot of each URL?'
        required: false
        type: boolean
        default: false
      download_images:
        description: 'Download all images found in the page?'
        required: false
        type: boolean
        default: false
      delay:
        description: 'Delay between each URL (seconds, can be decimal like 3)'
        required: false
        default: '3'
        type: string
      add_jitter:
        description: 'Add random 0-1 second jitter (sub-second precision)'
        required: false
        default: false
        type: boolean
      screenshot_delay:
        description: 'Delay before taking screenshot (seconds after page load)'
        required: false
        default: '0'
        type: string

jobs:
  save-file:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Install required packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq aria2 zip curl bc imagemagick
          if [ "${{ github.event.inputs.take_screenshot }}" = "true" ] || [ "${{ github.event.inputs.download_images }}" = "true" ]; then
            echo "Installing Node.js for scraping..."
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y -qq nodejs
            npm install puppeteer
          fi

      - name: Download, compress images, and package files
        run: |
          MODE="${{ github.event.inputs.pack_method }}"
          URLS="${{ github.event.inputs.urls }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          COMPRESS_IMAGES="${{ github.event.inputs.compress_images }}"
          IMAGE_QUALITY="${{ github.event.inputs.image_quality }}"
          SPLIT_THRESHOLD_MB=${{ github.event.inputs.split_size }}
          TAKE_SCREENSHOT="${{ github.event.inputs.take_screenshot }}"
          DOWNLOAD_IMAGES="${{ github.event.inputs.download_images }}"
          DELAY="${{ github.event.inputs.delay }}"
          ADD_JITTER="${{ github.event.inputs.add_jitter }}"
          SCREENSHOT_DELAY="${{ github.event.inputs.screenshot_delay }}"

          # Validate DELAY
          if ! [[ "$DELAY" =~ ^[0-9]+(\.[0-9]+)?$ ]] || [ "$(echo "$DELAY < 0" | bc)" -eq 1 ]; then
            DELAY=0
          fi
          # Validate SCREENSHOT_DELAY
          if ! [[ "$SCREENSHOT_DELAY" =~ ^[0-9]+(\.[0-9]+)?$ ]] || [ "$(echo "$SCREENSHOT_DELAY < 0" | bc)" -eq 1 ]; then
            SCREENSHOT_DELAY=0
          fi
          if ! [[ "$SPLIT_THRESHOLD_MB" =~ ^[0-9]+$ ]] || [ "$SPLIT_THRESHOLD_MB" -le 0 ]; then
            SPLIT_THRESHOLD_MB=45
          fi
          SPLIT_THRESHOLD_BYTES=$(( SPLIT_THRESHOLD_MB * 1024 * 1024 ))

          case "$IMAGE_QUALITY" in
            low)    QUALITY=30 ;;
            medium) QUALITY=60 ;;
            high)   QUALITY=85 ;;
            *)      QUALITY=60 ;;
          esac

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          BACKUP_DIR="/tmp/download_backup_$$"
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt
          mkdir -p tmp_downloads

          generate_random_numeric_name() {
            local PART1=$(( RANDOM * 32768 + RANDOM ))
            local PART2=$(( RANDOM * 32768 + RANDOM ))
            echo "${PART1}${PART2}"
          }

          get_unique_numeric_folder() {
            local CANDIDATE
            while true; do
              CANDIDATE=$(generate_random_numeric_name)
              if [ ! -d "$BACKUP_DIR/$CANDIDATE" ] && [ ! -d "downloads/$CANDIDATE" ]; then
                echo "$CANDIDATE"
                return
              fi
            done
          }

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          download_with_retry() {
            local URL="$1" FILENAME="$2"
            local MAX_RETRIES=3
            local SUCCESS=false
            rm -f "tmp_downloads/$FILENAME" "tmp_downloads/$FILENAME.aria2"

            for ((attempt=1; attempt<=MAX_RETRIES; attempt++)); do
              echo "Attempt $attempt of $MAX_RETRIES for $FILENAME"
              aria2c --split=2 --max-connection-per-server=2 --min-split-size=20M \
                --max-tries=3 --retry-wait=5 --timeout=60 --connect-timeout=30 \
                --follow-torrent=false --check-certificate=false --allow-overwrite=true \
                --auto-file-renaming=false --dir="tmp_downloads" --out="$FILENAME" "$URL" 2>/dev/null
              if [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
                SUCCESS=true; break
              fi
              rm -f "tmp_downloads/$FILENAME"
              curl -L -f -# --retry 3 --retry-delay 5 --connect-timeout 30 --max-time 3600 \
                -A "Mozilla/5.0" -o "tmp_downloads/$FILENAME" "$URL" 2>/dev/null
              if [ -f "tmp_downloads/$FILENAME" ] && [ -s "tmp_downloads/$FILENAME" ]; then
                SUCCESS=true; break
              fi
              sleep 5
            done

            if [ "$SUCCESS" = true ]; then return 0
            else echo "Download failed: $FILENAME"; rm -f "tmp_downloads/$FILENAME"; return 1; fi
          }

          compress_image() {
            local IMG="$1"
            local ORIG_SIZE=$(stat -c%s "$IMG")
            echo "Compressing $IMG (quality $QUALITY%)"
            convert "$IMG" -quality "$QUALITY" "$IMG.compressed"
            local NEW_SIZE=$(stat -c%s "$IMG.compressed")
            if [ "$NEW_SIZE" -lt "$ORIG_SIZE" ] && [ "$NEW_SIZE" -gt 0 ]; then
              mv "$IMG.compressed" "$IMG"
            else
              rm -f "$IMG.compressed"
            fi
          }

          if [ "$TAKE_SCREENSHOT" = "true" ] || [ "$DOWNLOAD_IMAGES" = "true" ]; then
            cat > scrape.js << 'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const url = process.argv[2];
          const idx = process.argv[3];
          const doScreenshot = process.argv[4] === 'true';
          const doImages = process.argv[5] === 'true';
          const screenshotDelaySec = parseFloat(process.argv[6] || '0');

          (async () => {
            const browser = await puppeteer.launch({
              headless: true, args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();
            await page.setViewport({ width: 1280, height: 720 });
            try {
              await page.goto(url, { waitUntil: 'networkidle2', timeout: 30000 });

              // Wait additional user-defined seconds before capturing
              if (screenshotDelaySec > 0) {
                console.log(`Waiting ${screenshotDelaySec}s before screenshot...`);
                await new Promise(resolve => setTimeout(resolve, screenshotDelaySec * 1000));
              }

              if (doScreenshot) {
                await page.screenshot({ path: `tmp_downloads/screenshot_${idx}.png`, fullPage: true });
              }
              if (doImages) {
                const imgUrls = await page.evaluate(() =>
                  Array.from(document.querySelectorAll('img'))
                    .map(img => img.src)
                    .filter(src => src.match(/\.(png|jpg|jpeg|gif|svg|webp)(\?.*)?$/i))
                );
                for (const imgUrl of imgUrls) {
                  const name = imgUrl.split('/').pop().split('?')[0].replace(/[^a-zA-Z0-9._-]/g, '_');
                  const dest = `tmp_downloads/img_${idx}_${name}`;
                  try {
                    const response = await page.goto(imgUrl, { waitUntil: 'networkidle2', timeout: 15000 });
                    if (response && response.ok) {
                      const buffer = await response.buffer();
                      fs.writeFileSync(dest, buffer);
                      console.log(`Image saved: ${dest}`);
                    }
                  } catch (e) { console.log(`Image failed: ${imgUrl}`); }
                }
              }
            } catch (err) { console.error(`Scrape error: ${err.message}`); }
            finally { await browser.close(); }
          })();
          EOF
          fi

          # ── دانلود تمام لینک‌ها (با تأخیر) ──
          read -ra URL_ARRAY <<< "$URLS"
          TOTAL_URLS=${#URL_ARRAY[@]}

          idx=0
          for URL in "${URL_ARRAY[@]}"; do
            idx=$((idx + 1))

            if [ "$TAKE_SCREENSHOT" = "true" ] || [ "$DOWNLOAD_IMAGES" = "true" ]; then
              echo "🌐 Scraping page #$idx/$TOTAL_URLS: $URL"
              node scrape.js "$URL" "$idx" "$TAKE_SCREENSHOT" "$DOWNLOAD_IMAGES" "$SCREENSHOT_DELAY" || true
            fi

            FILENAME=$(basename "$URL" | sed 's/%20/ /g; s/%2F/-/g; s/[?#].*//' | sed 's/[<>:"|?*]/_/g')
            echo "📥 Direct download #$idx/$TOTAL_URLS: $URL -> $FILENAME"
            download_with_retry "$URL" "$FILENAME" || true

            if [ $idx -lt $TOTAL_URLS ]; then
              SLEEP_TIME=$DELAY
              if [ "$ADD_JITTER" = "true" ]; then
                JITTER=$(echo "scale=3; $RANDOM/32767" | bc)
                SLEEP_TIME=$(echo "$DELAY + $JITTER" | bc)
              fi
              if [ "$(echo "$SLEEP_TIME > 0" | bc)" -eq 1 ]; then
                echo "⏳ Waiting ${SLEEP_TIME}s before next URL..."
                sleep $SLEEP_TIME
              fi
            fi
          done

          # ── فشرده‌سازی تصاویر (همه‌ی فایل‌های tmp_downloads) ──
          if [ "$COMPRESS_IMAGES" = "true" ]; then
            echo "====== Compressing images ======"
            find tmp_downloads -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.webp" -o -iname "*.bmp" \) -exec bash -c 'compress_image "$0"' {} \;
          fi

          # ── بسته‌بندی یکپارچه (همه فایل‌ها در یک پوشه) ──
          if [ -z "$( ls -A tmp_downloads 2>/dev/null )" ]; then
            echo "No files downloaded!"
            exit 1
          fi

          FOLDER_NAME=$(get_unique_numeric_folder)
          FINAL_DIR="$BACKUP_DIR/$FOLDER_NAME"
          mkdir -p "$FINAL_DIR"
          FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")

          mv tmp_downloads/* "$FINAL_DIR"/
          rmdir tmp_downloads

          TOTAL_SIZE=0
          for f in "$FINAL_DIR"/*; do
            TOTAL_SIZE=$(( TOTAL_SIZE + $(stat -c%s "$f") ))
          done
          TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE/1048576" | bc)

          if [ "$MODE" = "none" ]; then
            {
              echo "# Downloaded files"
              echo ""
              echo "**Total size:** ${TOTAL_SIZE_MB} MB"
              echo ""
              echo "## Files"
              for f in "$FINAL_DIR"/*; do
                bname=$(basename "$f")
                enc=$(urlencode "$bname")
                echo "- [${bname}](https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${enc})"
              done
            } > "$FINAL_DIR/README.md"

          elif [ "$MODE" = "zip" ] || [ "$MODE" = "split" ]; then
            cd "$BACKUP_DIR"
            ZIP_NAME="${FOLDER_NAME}.zip"

            DO_SPLIT=false
            if [ "$MODE" = "split" ] && [ "$TOTAL_SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
              DO_SPLIT=true
            fi

            if [ "$DO_SPLIT" = true ]; then
              echo "Splitting archive into ${SPLIT_THRESHOLD_MB}MB parts..."
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -s ${SPLIT_THRESHOLD_MB}m -r -P "$ZIP_PASSWORD" "$ZIP_NAME" "$FOLDER_NAME"
              else
                zip -s ${SPLIT_THRESHOLD_MB}m -r "$ZIP_NAME" "$FOLDER_NAME"
              fi
            else
              if [ -n "$ZIP_PASSWORD" ]; then
                zip -qr -P "$ZIP_PASSWORD" "$ZIP_NAME" "$FOLDER_NAME"
              else
                zip -qr "$ZIP_NAME" "$FOLDER_NAME"
              fi
            fi

            rm -rf "$FOLDER_NAME"
            mkdir -p "$FINAL_DIR"

            if [ "$DO_SPLIT" = true ]; then
              for part in ${FOLDER_NAME}.z[0-9]* ${ZIP_NAME}; do
                [ -f "$part" ] && mv "$part" "$FINAL_DIR/"
              done
              ARCHIVE_SIZE=0
              for part in "$FINAL_DIR"/*; do
                ARCHIVE_SIZE=$(( ARCHIVE_SIZE + $(stat -c%s "$part") ))
              done
              ARCHIVE_MB=$(echo "scale=2; $ARCHIVE_SIZE/1048576" | bc)
              {
                echo "# Combined split archive"
                echo ""
                echo "**Total archive size:** ${ARCHIVE_MB} MB"
                echo ""
                echo "**Parts:**"
                for part in "$FINAL_DIR"/*; do
                  pname=$(basename "$part")
                  penc=$(urlencode "$pname")
                  echo "- [${pname}](https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${penc})"
                done
                echo ""
                echo "Download all parts and extract \`${ZIP_NAME}\` with 7-Zip/WinRAR."
              } > "$FINAL_DIR/README.md"
            else
              mv "${ZIP_NAME}" "$FINAL_DIR/"
              ZIP_SIZE=$(stat -c%s "$FINAL_DIR/$ZIP_NAME")
              ZIP_MB=$(echo "scale=2; $ZIP_SIZE/1048576" | bc)
              {
                echo "# Combined archive"
                echo ""
                echo "**ZIP size:** ${ZIP_MB} MB"
                echo ""
                echo "[Download ZIP](https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/$(urlencode "${ZIP_NAME}"))"
              } > "$FINAL_DIR/README.md"
            fi
            cd "$GITHUB_WORKSPACE"
          fi

          echo "Packaging completed. Folder: $FOLDER_NAME"
          echo "FOLDER_NAME=$FOLDER_NAME" >> $GITHUB_ENV

      - name: Update README.md and push
        run: |
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          FOLDER_NAME="${{ env.FOLDER_NAME }}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"

          mkdir -p downloads
          if [ -d "$BACKUP_DIR/$FOLDER_NAME" ]; then
            cp -r "$BACKUP_DIR/$FOLDER_NAME" downloads/
            echo "Copied folder to downloads/"
          else
            echo "Backup folder not found!"
            exit 1
          fi

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")

          if [ -f "downloads/$FOLDER_NAME/${FOLDER_NAME}.zip" ]; then
            ARCHIVE_SIZE=$(stat -c%s "downloads/$FOLDER_NAME/${FOLDER_NAME}.zip")
          elif ls downloads/$FOLDER_NAME/*.z[0-9]* 1>/dev/null 2>&1; then
            ARCHIVE_SIZE=0
            for p in downloads/$FOLDER_NAME/*.z*; do
              ARCHIVE_SIZE=$(( ARCHIVE_SIZE + $(stat -c%s "$p") ))
            done
          else
            ARCHIVE_SIZE=0
          fi
          ARCHIVE_MB=$(echo "scale=2; $ARCHIVE_SIZE/1048576" | bc)

          {
            echo "# Downloaded list :"
            echo ""
            echo "- [${ARCHIVE_MB} MB](./${FOLDER_ENCODED})"
            echo ""
            echo "---"
          } > downloads/README.md

          touch README.md
          sed -i '/^## Latest Downloads/,/^---$/d' README.md
          {
            echo "## Latest Downloads"
            echo "- [${ARCHIVE_MB} MB](${REPO_URL}/${FOLDER_ENCODED})"
            echo "---"
          } >> README.md

          git add downloads/ README.md
          git diff --cached --quiet || git commit -m "[Download] New files [skip ci]"
          git pull --rebase origin "$BRANCH"
          git push origin HEAD:"$BRANCH"