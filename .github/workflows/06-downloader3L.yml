            fi
          done

          rm -rf tmp_downloads
          find "$BACKUP_DIR" -type f | head -50

      - name: Stop Cloudflare WARP container
        if: always()
        run: |
          docker stop warp 2>/dev/null || true
          docker rm warp 2>/dev/null || true

      - name: Incremental commit and push
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          echo "Files to push: $(find "$BACKUP_DIR" -type f | wc -l)"

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          regenerate_master_readme() {
            local MASTER_README="videos/README.md"
            {
              echo "# Downloaded Videos"
              echo ""
              echo "---"
              echo ""
            } > "$MASTER_README"

            local VIDEO_EMOJIS=("🎬" "🎥" "📽️" "🎞️" "📺" "🎦" "🎭" "🎪" "🎯" "🎮" "🎵" "🎶" "🎸" "🎹" "🎤")
            local NUM=0
            for folder in videos/*/; do
              [ -d "$folder" ] || continue
              FOLDER_NAME=$(basename "$folder")
              [ -f "$folder/README.md" ] || continue
              NUM=$((NUM + 1))
              EMOJI="${VIDEO_EMOJIS[$RANDOM % ${#VIDEO_EMOJIS[@]}]}"
              FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
              FOLDER_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/tree/${BRANCH}/videos/${FOLDER_ENCODED}"
              printf -- "- %s - %s [%s](%s)\n" "$NUM" "$EMOJI" "$FOLDER_NAME" "$FOLDER_LINK" >> "$MASTER_README"
            done
          }

          # Collect files sorted by size (small READMEs first, then large data)
          declare -a ALL_FILES=()
          while IFS= read -r -d '' f; do ALL_FILES+=("$f"); done < <(find videos -name "README.md" -print0 2>/dev/null)
          while IFS= read -r -d '' f; do ALL_FILES+=("$f"); done < <(find videos -type f \( -name "*.7z" -o -name "*.7z.[0-9]*" -o -name "*.mp4" -o -name "*.mp3" -o -name "*.m4a" \) -print0 2>/dev/null | sort -z)

          TOTAL_FILES=${#ALL_FILES[@]}
          echo "Total files to push: $TOTAL_FILES"

          if [ $TOTAL_FILES -eq 0 ]; then
            echo "No files to push"
            exit 0
          fi

          # Sync with remote first
          git fetch origin "$BRANCH"
          git reset --hard origin/"$BRANCH"
          mkdir -p videos
          cp -r "$BACKUP_DIR"/* videos/

          # Push strategy: below 100MB push all at once, otherwise batch push
          TOTAL_SIZE=$(find videos -type f -newer /tmp/backup_dir_path.txt -print0 2>/dev/null | du -cb --files0-from=- 2>/dev/null | tail -1 | cut -f1)
          TOTAL_SIZE_MB=$(( ${TOTAL_SIZE:-0} / 1024 / 1024 ))

          if [ "$TOTAL_SIZE_MB" -lt 100 ]; then
            git add -A videos/
            regenerate_master_readme
            git add videos/README.md
            git commit -m "[YouTube] Add video [skip ci]"
            for ((i=1; i<=10; i++)); do
              if timeout 300 git push origin HEAD:"$BRANCH"; then
                echo "Push successful"
                exit 0
              fi
              echo "Push failed, retry $i/10..."
              git fetch origin "$BRANCH"
              git reset --hard origin/"$BRANCH"
              cp -r "$BACKUP_DIR"/* videos/
              git add -A videos/
              regenerate_master_readme
              git add videos/README.md
              git commit -m "[YouTube] Add video [skip ci]" || true
              sleep $((3 + RANDOM % 7))
            done
          else
            # Batch push
            BATCH_SIZE=3
            batch=()
            pushed=0
            for file in "${ALL_FILES[@]}"; do
              batch+=("$file")
              if ((${#batch[@]} >= BATCH_SIZE)); then
                pushed=$((pushed + ${#batch[@]}))
                echo "Pushing batch $pushed/$TOTAL_FILES..."
                git fetch origin "$BRANCH" --quiet
                git reset --hard origin/"$BRANCH"
                cp -r "$BACKUP_DIR"/* videos/
                for f in "${batch[@]}"; do git add "$f" 2>/dev/null; done
                if ! git diff --cached --quiet; then
                  git commit -m "[YouTube] Add batch [skip ci]"
                  for ((r=1; r<=5; r++)); do
                    if timeout 180 git push origin HEAD:"$BRANCH"; then break; fi
                    git fetch origin "$BRANCH" --quiet
                    git reset --hard origin/"$BRANCH"
                    cp -r "$BACKUP_DIR"/* videos/
                    for f in "${batch[@]}"; do git add "$f" 2>/dev/null; done
                    git commit -m "[YouTube] Add batch [skip ci]" || true
                    sleep $((3 + RANDOM % 7))
                  done
                fi
                batch=()
                sleep 2
              fi
            done

            # Remaining files
            if ((${#batch[@]} > 0)); then
              echo "Pushing final batch..."
              git fetch origin "$BRANCH" --quiet
              git reset --hard origin/"$BRANCH"
              cp -r "$BACKUP_DIR"/* videos/
              for f in "${batch[@]}"; do git add "$f" 2>/dev/null; done
              git commit -m "[YouTube] Add final batch [skip ci]"
              for ((r=1; r<=5; r++)); do
                if timeout 180 git push origin HEAD:"$BRANCH"; then break; fi
                git fetch origin "$BRANCH" --quiet
                git reset --hard origin/"$BRANCH"
                cp -r "$BACKUP_DIR"/* videos/
                for f in "${batch[@]}"; do git add "$f" 2>/dev/null; done
                git commit -m "[YouTube] Add final batch [skip ci]" || true
                sleep $((3 + RANDOM % 7))
              done
            fi

            # Push master README at the end
            git fetch origin "$BRANCH" --quiet
            git reset --hard origin/"$BRANCH"
            cp -r "$BACKUP_DIR"/* videos/
            regenerate_master_readme
            git add videos/README.md
            if ! git diff --cached --quiet; then
              git commit -m "[YouTube] Update video list [skip ci]"
              timeout 60 git push origin HEAD:"$BRANCH" || true
            fi
          fi

          echo "Push process completed."