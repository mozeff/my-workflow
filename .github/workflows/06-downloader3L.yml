name: 💾 Large YouTube Video Downloader

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube video URL'
        required: true
        type: string
      quality:
        description: 'Video quality (best, 1080, 720, 480, audio)'
        required: false
        default: 'best'
        type: string
      password:
        description: 'Password for 7z archives (optional)'
        required: false
        default: ''
        type: string

jobs:
  download-youtube:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for large files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "Git configured for large files"

      - name: Start Cloudflare WARP proxy
        run: |
          echo "Starting Cloudflare WARP container..."
          docker network create warp-net 2>/dev/null || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "Waiting for WARP to initialize (30s)..."
          sleep 30

          for i in {1..10}; do
            RESULT=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              echo "$RESULT"
              break
            fi
            echo "Attempt $i/10 - WARP not ready yet, waiting..."
            sleep 10
          done

          FINAL=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
          if echo "$FINAL" | grep -qE "warp=(on|plus)"; then
            echo "WARP proxy is ready!"
          else
            echo "WARP might not be fully active, continuing anyway..."
            echo "Response: $FINAL"
          fi

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip ffmpeg zip p7zip-full curl jq bc unzip
          # Deno (required by yt-dlp for YouTube challenges)
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          deno --version
          pip3 install --upgrade yt-dlp

      - name: Download YouTube video
        run: |
          set -euo pipefail
          URL="${{ github.event.inputs.youtube_url }}"
          QUALITY="${{ github.event.inputs.quality }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"

          SPLIT_MB=45
          SPLIT_BYTES=$(( SPLIT_MB * 1024 * 1024 ))

          BACKUP_DIR="/tmp/video_backup_$$"
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt
          mkdir -p videos tmp_downloads

          echo "Downloading: $URL"
          echo "Quality: $QUALITY"
          echo "Split size: ${SPLIT_MB}MB"
          if [ -n "$ZIP_PASSWORD" ]; then
            echo "Password protection: ENABLED"
          else
            echo "Password protection: DISABLED"
          fi

          sanitize_name() {
            echo "$1" | sed 's/ /-/g; s/　/-/g' | tr -s '-'
          }

          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }

          case "$QUALITY" in
            audio)   FORMAT="bestaudio" ;;
            best)    FORMAT="bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" ;;
            1080)    FORMAT="bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/best[height<=1080][ext=mp4]/best" ;;
            720)     FORMAT="bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720][ext=mp4]/best" ;;
            480)     FORMAT="bestvideo[height<=480][ext=mp4]+bestaudio[ext=m4a]/best[height<=480][ext=mp4]/best" ;;
            *)       FORMAT="bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" ;;
          esac

          COMMON_FLAGS="--merge-output-format mp4 --output tmp_downloads/%(title)s.%(ext)s --no-part --no-playlist --retries 10 --fragment-retries 10 --no-check-certificates"

          METHODS=(
            "--proxy socks5://127.0.0.1:1080 --extractor-args youtube:player_client=mweb --concurrent-fragments 4"
            "--proxy socks5://127.0.0.1:1080 --extractor-args youtube:player_client=android --user-agent 'Mozilla/5.0 (Linux; Android 12; SM-S906N Build/QP1A.190711.020) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/112.0.0.0 Mobile Safari/537.36' --concurrent-fragments 4"
            "--proxy socks5://127.0.0.1:1080 --extractor-args youtube:player_client=mweb,android --concurrent-fragments 4"
            "--proxy socks5://127.0.0.1:1080 --extractor-args youtube:player_client=web --js-runtimes deno --user-agent 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36' --add-header Accept-Language:en-US,en;q=0.9"
            "--proxy socks5://127.0.0.1:1080 --extractor-args youtube:player_client=android_vr --concurrent-fragments 4"
            "--extractor-args youtube:player_client=mweb --concurrent-fragments 4"
            "--extractor-args youtube:player_client=android --concurrent-fragments 4"
            "--proxy socks5://127.0.0.1:1080 --extractor-args youtube:player_client=mweb,android,android_vr --concurrent-fragments 4"
          )

          DOWNLOAD_OK=false
          for idx in "${!METHODS[@]}"; do
            echo "Trying download method $((idx+1))/${#METHODS[@]}..."
            if yt-dlp --format "$FORMAT" $COMMON_FLAGS ${METHODS[$idx]} "$URL"; then
              DOWNLOAD_OK=true
              echo "Download successful with method $((idx+1))!"
              break
            else
              echo "Method $((idx+1)) failed, waiting..."
              sleep $((RANDOM % 10 + 5))
            fi
          done

          if ! $DOWNLOAD_OK; then
            echo "All download methods failed!"
            exit 1
          fi

          find tmp_downloads -name "*.part" -delete
          echo "Download complete. Files:"
          ls -la tmp_downloads/

          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          BRANCH="${GITHUB_REF_NAME}"

          RANDOM_WORDS=("alpha" "beta" "gamma" "delta" "epsilon" "zeta" "theta" "kappa" "lambda" "sigma" "omega" "nova" "star" "moon" "sun" "sky" "cloud" "river" "ocean" "mountain")

          get_random_word() {
            echo "${RANDOM_WORDS[$RANDOM % ${#RANDOM_WORDS[@]}]}_$RANDOM"
          }

          get_unique_folder() {
            local BASE_PATH="$1"
            local NAME="$2"
            if [ ! -d "$BASE_PATH/$NAME" ] && [ ! -d "$BACKUP_DIR/$NAME" ]; then
              echo "$NAME"
              return
            fi
            local RANDOM_SUFFIX=$(get_random_word)
            while [ -d "$BASE_PATH/${NAME}_${RANDOM_SUFFIX}" ] || [ -d "$BACKUP_DIR/${NAME}_${RANDOM_SUFFIX}" ]; do
              RANDOM_SUFFIX=$(get_random_word)
            done
            echo "${NAME}_${RANDOM_SUFFIX}"
          }

          > /tmp/video_info.txt

          FILE_INDEX=0
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            SIZE=$(stat -c%s "$FILE")
            BASENAME=$(basename "$FILE")
            FILENAME_NO_EXT="${BASENAME%.*}"
            EXT="${BASENAME##*.}"
            FILE_INDEX=$((FILE_INDEX + 1))
            FILENAME_NO_EXT=$(sanitize_name "$FILENAME_NO_EXT")

            echo "Processing: $BASENAME ($(( SIZE / 1024 / 1024 ))MB)"

            FINAL_FOLDER_NAME=$(get_unique_folder "videos" "$FILENAME_NO_EXT")
            mkdir -p "$BACKUP_DIR/${FINAL_FOLDER_NAME}"
            echo "${FILENAME_NO_EXT}|${FINAL_FOLDER_NAME}" >> /tmp/video_info.txt
            FOLDER_ENCODED=$(urlencode "${FINAL_FOLDER_NAME}")

            if [ "$SIZE" -gt "$SPLIT_BYTES" ]; then
              echo "Splitting into ${SPLIT_MB}MB parts..."
              ARCHIVE_BASE="$BACKUP_DIR/${FINAL_FOLDER_NAME}/${FINAL_FOLDER_NAME}"
              if [ -n "$ZIP_PASSWORD" ]; then
                7z a -v${SPLIT_MB}m -p"${ZIP_PASSWORD}" -mhe=on -mx=0 "${ARCHIVE_BASE}.7z" "$FILE"
              else
                7z a -v${SPLIT_MB}m -mx=0 "${ARCHIVE_BASE}.7z" "$FILE"
              fi

              PART_COUNT=$(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.7z* 2>/dev/null | wc -l)
              TOTAL_SIZE=$(find "$BACKUP_DIR/${FINAL_FOLDER_NAME}" -type f -print0 | xargs -0 stat -c%s 2>/dev/null | paste -sd+ | bc)
              TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)

              # Download links markdown
              DOWNLOAD_LINKS_MD=""
              LINK_NUM=0
              for part_file in $(ls "$BACKUP_DIR/${FINAL_FOLDER_NAME}/"*.7z* 2>/dev/null | sort); do
                [ -f "$part_file" ] || continue
                PART_BASENAME=$(basename "$part_file")
                PART_ENCODED=$(urlencode "${PART_BASENAME}")
                RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/videos/${FOLDER_ENCODED}/${PART_ENCODED}"
                LINK_NUM=$((LINK_NUM + 1))
                DOWNLOAD_LINKS_MD+="| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
              done

              cat > "$BACKUP_DIR/${FINAL_FOLDER_NAME}/README.md" <<EOF
# ${FILENAME_NO_EXT}

---

## Video Information

| Property | Value |
|----------|-------|
| **Video Name** | \`${FILENAME_NO_EXT}\` |
| **Original Link** | [YouTube Video](${URL}) |
| **Total Size** | **${PART_COUNT} parts** - **${TOTAL_SIZE_MB} MB** |
| **Quality** | **${QUALITY}** |
| **Status** | **Complete (100%)** |
| **Password Protected** | **$( [ -n "$ZIP_PASSWORD" ] && echo "YES" || echo "NO" )** |

---

## Download Links

| # | File | Link |
|---|------|------|
${DOWNLOAD_LINKS_MD}

---

## How to Extract

1. **Download** all parts (e.g., \`.7z.001\`, \`.7z.002\`...)
2. **Install** [7-Zip](https://www.7-zip.org/) (Windows/Linux) / [Keka](https://www.keka.io/) (Mac)
3. **Right-click** the \`.7z.001\` file → Extract Here
4. All parts combine automatically into the original video
$( if [ -n "$ZIP_PASSWORD" ]; then echo "5. Enter the password when prompted"; fi )

